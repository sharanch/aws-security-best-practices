n  --db-instance-identifier mydb \\\\\\n  --backup-retention-period 0   # This disables automated backups entirely\\n```\\n\\n### Scenario 3 \\u2014 Snapshot Shared to Wrong Account\\n```bash\\n# Engineer sharing a snapshot for a vendor to debug an issue\\n# Accidentally shares to the wrong account ID\\naws rds modify-db-snapshot-attribute \\\\\\n  --db-snapshot-identifier prod-db-snapshot \\\\\\n  --attribute-name restore \\\\\\n  --values-to-add 999999999999  # Typo in account ID \\u2014 shared with stranger\\n# Stranger restores your entire production database\\n```\\n\\n---\\n\\n## Detection \\u2014 Enable Audit Logging\\n\\n```bash\\n# PostgreSQL \\u2014 enable pgaudit\\naws rds create-db-parameter-group \\\\\\n  --db-parameter-group-name pgaudit-params \\\\\\n  --db-parameter-group-family postgres15 \\\\\\n  --description \\\"Enable pgaudit logging\\\"\\n\\naws rds modify-db-parameter-group \\\\\\n  --db-parameter-group-name pgaudit-params \\\\\\n  --parameters \\\\\\n    'ParameterName=shared_preload_libraries,ParameterValue=pgaudit,ApplyMethod=pending-reboot' \\\\\\n    'ParameterName=pgaudit.log,ParameterValue=all,ApplyMethod=immediate' \\\\\\n    'ParameterName=log_connections,ParameterValue=1,ApplyMethod=immediate' \\\\\\n    'ParameterName=log_disconnections,ParameterValue=1,ApplyMethod=immediate'\\n\\n# Enable CloudWatch log export for audit logs\\naws rds modify-db-instance \\\\\\n  --db-instance-identifier mydb \\\\\\n  --cloudwatch-logs-export-configuration 'EnableLogTypes=[\\\"postgresql\\\",\\\"upgrade\\\"]' \\\\\\n  --apply-immediately\\n\\n# MySQL \\u2014 enable general log and audit log\\naws rds modify-db-parameter-group \\\\\\n  --db-parameter-group-name mysql-audit-params \\\\\\n  --parameters \\\\\\n    'ParameterName=general_log,ParameterValue=1,ApplyMethod=immediate' \\\\\\n    'ParameterName=slow_query_log,ParameterValue=1,ApplyMethod=immediate' \\\\\\n    'ParameterName=long_query_time,ParameterValue=2,ApplyMethod=immediate'\\n```\\n\\n---\\n\\n## Query Audit Logs for Forensics\\n\\n```bash\\n# After a suspected breach \\u2014 query PostgreSQL audit logs in CloudWatch\\naws logs start-query \\\\\\n  --log-group-name /aws/rds/instance/mydb/postgresql \\\\\\n  --start-time $(date -d '24 hours ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields @timestamp, @message\\n    | filter @message like /SELECT/\\n    | filter @message like /customers/\\n    | sort @timestamp asc\\n    | limit 100'\\n\\n# Find all connections from unexpected IPs\\naws logs start-query \\\\\\n  --log-group-name /aws/rds/instance/mydb/postgresql \\\\\\n  --start-time $(date -d '24 hours ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields @timestamp, @message\\n    | filter @message like /connection received/\\n    | parse @message \\\"host=* \\\" as source_ip\\n    | stats count(*) by source_ip\\n    | sort count desc'\\n\\n# Find large data exports (slow queries touching many rows)\\naws logs start-query \\\\\\n  --log-group-name /aws/rds/instance/mydb/postgresql \\\\\\n  --start-time $(date -d '24 hours ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields @timestamp, @message\\n    | filter @message like /duration/\\n    | parse @message \\\"duration: * ms\\\" as duration_ms\\n    | filter duration_ms > 5000\\n    | sort duration_ms desc'\\n```\\n\\n---\\n\\n## Backup and Recovery\\n\\n```bash\\n# Verify automated backups are configured correctly\\naws rds describe-db-instances \\\\\\n  --db-instance-identifier mydb \\\\\\n  --query 'DBInstances[*].[DBInstanceIdentifier,BackupRetentionPeriod,PreferredBackupWindow,LatestRestorableTime]' \\\\\\n  --output table\\n\\n# List all automated snapshots for an instance\\naws rds describe-db-snapshots \\\\\\n  --db-instance-identifier mydb \\\\\\n  --snapshot-type automated \\\\\\n  --query 'DBSnapshots[*].[DBSnapshotIdentifier,SnapshotCreateTime,Status]' \\\\\\n  --output table\\n\\n# Point-in-time recovery \\u2014 restore to 1 hour before attack\\naws rds restore-db-instance-to-point-in-time \\\\\\n  --source-db-instance-identifier mydb \\\\\\n  --target-db-instance-identifier mydb-recovered \\\\\\n  --restore-time $(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)\\n\\n# Restore from a specific manual snapshot\\naws rds restore-db-instance-from-db-snapshot \\\\\\n  --db-instance-identifier mydb-restored \\\\\\n  --db-snapshot-identifier mydb-clean-snapshot \\\\\\n  --db-subnet-group-name private-subnets \\\\\\n  --no-publicly-accessible\\n\\n# Audit snapshot access history\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=ResourceName,AttributeValue=mydb-snapshot \\\\\\n  --query 'Events[*].[EventTime,EventName,Username,SourceIPAddress]' \\\\\\n  --output table\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] pgaudit or MySQL general log enabled and shipping to CloudWatch\\n- [ ] Log connections and disconnections enabled\\n- [ ] CloudWatch log retention set to 90 days minimum for DB logs\\n- [ ] Automated backups enabled with 7+ day retention period\\n- [ ] Point-in-time recovery tested \\u2014 know your RTO/RPO\\n- [ ] Deletion protection enabled \\u2014 prevents accidental or malicious instance deletion\\n- [ ] Manual snapshots taken before major changes or deployments\\n- [ ] Snapshot sharing audited \\u2014 only explicitly approved account IDs allowed\\n- [ ] CloudWatch alarms on failed login attempts and unusual query volumes\\n\"}], \"tags\": [\"iam-db-auth\", \"encryption\", \"pgaudit\"], \"desc\": \"Publicly accessible instances, IAM DB auth, encryption at rest, audit logging\"}, {\"id\": \"08-detection\", \"num\": \"08\", \"name\": \"Detection &amp; Response\", \"readme\": \"# 08 \\u2014 Detection & Response (CloudTrail, GuardDuty, Security Hub)\\n\\nPrevention controls will eventually fail. When they do, detection speed determines the blast radius. The difference between a minor incident and a catastrophic breach is often how quickly you find out.\\n\\n## Topics\\n\\n| File | Topic |\\n|------|-------|\\n| [01-cloudtrail.md](./01-cloudtrail.md) | Hardening CloudTrail, log protection, forensic queries |\\n| [02-guardduty.md](./02-guardduty.md) | GuardDuty threat findings, alerting, and response automation |\\n| [03-security-hub.md](./03-security-hub.md) | Security Hub aggregation, standards, and SIEM integration |\\n\\n## Key Threat Model\\n\\n```\\nCloudTrail Disabled          GuardDuty Finding Ignored      No Aggregation\\n       \\u2502                              \\u2502                           \\u2502\\n       \\u25bc                              \\u25bc                           \\u25bc\\nAttacker covers tracks        Breach ongoing for weeks      Siloed findings \\u2014\\nNo forensic evidence          before anyone notices         no full picture\\n```\\n\\n## The Detection Stack\\n\\n```\\nIndividual Services (EC2, S3, RDS, Lambda)\\n              \\u2502 emit events\\n              \\u25bc\\n        CloudTrail          \\u2190 API-level audit log (who did what, when, from where)\\n        VPC Flow Logs       \\u2190 Network-level visibility (who talked to who)\\n        CloudWatch Logs     \\u2190 Application and service logs\\n              \\u2502 feeds into\\n              \\u25bc\\n         GuardDuty          \\u2190 Threat intelligence, ML anomaly detection\\n         AWS Config         \\u2190 Configuration drift and compliance\\n              \\u2502 aggregated by\\n              \\u25bc\\n        Security Hub        \\u2190 Single pane of glass, findings normalized\\n              \\u2502 triggers\\n              \\u25bc\\n    EventBridge + SNS/Lambda \\u2190 Automated response and alerting\\n```\\n\\n## Top 5 Detection Controls\\n\\n1. CloudTrail enabled in all regions with log file validation and locked S3 bucket\\n2. GuardDuty enabled in all regions \\u2014 never disable it, even in dev\\n3. Security Hub enabled with CIS AWS Foundations and AWS Foundational Security standards\\n4. CloudWatch metric filters and alarms on root login, IAM changes, and CloudTrail stoppage\\n5. Automated response via EventBridge \\u2014 don't rely on humans checking consoles\\n\", \"docs\": [{\"slug\": \"01-cloudtrail\", \"title\": \"CloudTrail \\u2014 Hardening, Log Protection, and Forensic Queries\", \"content\": \"# CloudTrail \\u2014 Hardening, Log Protection, and Forensic Queries\\n\\n## Attack Scenarios\\n\\n### Scenario 1 \\u2014 Attacker Disables CloudTrail Immediately\\n```bash\\n# First thing a sophisticated attacker does after gaining admin access:\\naws cloudtrail stop-logging --name my-trail\\n# All subsequent API calls are now unlogged\\n# Without an SCP blocking this \\u2014 it takes one command\\n\\n# Or deletes the trail entirely\\naws cloudtrail delete-trail --name my-trail\\n\\n# Or deletes the S3 bucket storing logs\\naws s3 rb s3://my-cloudtrail-logs --force\\n```\\n\\n### Scenario 2 \\u2014 Single-Region Trail Misses Activity\\n```bash\\n# Trail only covers ap-south-1\\n# Attacker pivots to us-east-1 (common default for IAM, STS, S3 global calls)\\naws ec2 run-instances \\\\\\n  --region us-east-1 \\\\\\n  --image-id ami-12345678 \\\\\\n  --instance-type t3.large\\n# Crypto miner running in us-east-1 \\u2014 zero trail entries in your ap-south-1 trail\\n```\\n\\n### Scenario 3 \\u2014 Log Tampering \\u2014 Gaps in Logs\\n```bash\\n# If log file validation is disabled, attacker can:\\n# 1. Delete specific log files from S3\\n# 2. Modify log files to remove evidence\\n# 3. You have no way to detect the tampering\\n\\n# With log file validation enabled, each log file is hashed and chained\\n# Any deletion or modification breaks the chain \\u2014 detectable\\n```\\n\\n---\\n\\n## Detection \\u2014 Verify CloudTrail Health\\n\\n```bash\\n# 1. Check all trails and their status\\naws cloudtrail describe-trails \\\\\\n  --query 'trailList[*].[Name,IsMultiRegionTrail,IncludeGlobalServiceEvents,LogFileValidationEnabled,S3BucketName]' \\\\\\n  --output table\\n\\n# 2. Check if logging is actually active (trail can exist but be stopped)\\naws cloudtrail get-trail-status \\\\\\n  --name my-trail \\\\\\n  --query '[IsLogging,LatestDeliveryTime,LatestDeliveryError]' \\\\\\n  --output table\\n\\n# 3. Validate log file integrity\\naws cloudtrail validate-logs \\\\\\n  --trail-arn arn:aws:cloudtrail:ap-south-1:123456789:trail/my-trail \\\\\\n  --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --verbose\\n# Any \\\"Invalid\\\" entries = tampering detected\\n\\n# 4. Check if S3 data events are enabled (S3 object-level logging)\\naws cloudtrail get-event-selectors --trail-name my-trail \\\\\\n  --query 'EventSelectors[*].[ReadWriteType,IncludeManagementEvents,DataResources]'\\n```\\n\\n---\\n\\n## Fix \\u2014 Harden CloudTrail\\n\\n```bash\\n# Fix 1: Create a multi-region trail with all protections\\naws cloudtrail create-trail \\\\\\n  --name org-security-trail \\\\\\n  --s3-bucket-name my-cloudtrail-logs \\\\\\n  --is-multi-region-trail \\\\\\n  --include-global-service-events \\\\\\n  --enable-log-file-validation \\\\\\n  --kms-key-id arn:aws:kms:ap-south-1:123456789:key/key-id \\\\\\n  --tags-list Key=Purpose,Value=SecurityAudit\\n\\naws cloudtrail start-logging --name org-security-trail\\n\\n# Fix 2: Enable S3 data events (captures GetObject, PutObject, DeleteObject)\\naws cloudtrail put-event-selectors \\\\\\n  --trail-name org-security-trail \\\\\\n  --event-selectors '[\\n    {\\n      \\\"ReadWriteType\\\": \\\"All\\\",\\n      \\\"IncludeManagementEvents\\\": true,\\n      \\\"DataResources\\\": [\\n        {\\n          \\\"Type\\\": \\\"AWS::S3::Object\\\",\\n          \\\"Values\\\": [\\\"arn:aws:s3:::sensitive-bucket/\\\"]\\n        },\\n        {\\n          \\\"Type\\\": \\\"AWS::Lambda::Function\\\",\\n          \\\"Values\\\": [\\\"arn:aws:lambda\\\"]\\n        }\\n      ]\\n    }\\n  ]'\\n\\n# Fix 3: Lock the CloudTrail S3 bucket \\u2014 prevent deletion\\naws s3api put-bucket-policy \\\\\\n  --bucket my-cloudtrail-logs \\\\\\n  --policy '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [\\n      {\\n        \\\"Effect\\\": \\\"Deny\\\",\\n        \\\"Principal\\\": \\\"*\\\",\\n        \\\"Action\\\": [\\\"s3:DeleteObject\\\", \\\"s3:DeleteBucket\\\", \\\"s3:PutBucketPolicy\\\"],\\n        \\\"Resource\\\": [\\n          \\\"arn:aws:s3:::my-cloudtrail-logs\\\",\\n          \\\"arn:aws:s3:::my-cloudtrail-logs/*\\\"\\n        ],\\n        \\\"Condition\\\": {\\n          \\\"StringNotEquals\\\": {\\n            \\\"aws:PrincipalArn\\\": \\\"arn:aws:iam::123456789:role/SecurityAdminRole\\\"\\n          }\\n        }\\n      }\\n    ]\\n  }'\\n\\n# Fix 4: SCP \\u2014 prevent stopping or deleting CloudTrail\\naws organizations create-policy \\\\\\n  --name ProtectCloudTrail \\\\\\n  --type SERVICE_CONTROL_POLICY \\\\\\n  --content '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Deny\\\",\\n      \\\"Action\\\": [\\n        \\\"cloudtrail:StopLogging\\\",\\n        \\\"cloudtrail:DeleteTrail\\\",\\n        \\\"cloudtrail:UpdateTrail\\\",\\n        \\\"cloudtrail:PutEventSelectors\\\"\\n      ],\\n      \\\"Resource\\\": \\\"*\\\",\\n      \\\"Condition\\\": {\\n        \\\"StringNotEquals\\\": {\\n          \\\"aws:PrincipalArn\\\": \\\"arn:aws:iam::123456789:role/SecurityAdminRole\\\"\\n        }\\n      }\\n    }]\\n  }'\\n```\\n\\n---\\n\\n## Forensic Queries \\u2014 CloudTrail Lookup\\n\\n```bash\\n# 1. What did a specific user do in the last 24 hours?\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=Username,AttributeValue=sharan \\\\\\n  --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --query 'Events[*].[EventTime,EventName,SourceIPAddress,AwsRegion]' \\\\\\n  --output table\\n\\n# 2. What happened with a specific access key?\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=AKIAIOSFODNN7EXAMPLE \\\\\\n  --query 'Events[*].[EventTime,EventName,SourceIPAddress]' \\\\\\n  --output table\\n\\n# 3. All root account activity (should be near zero)\\naws cloudtrail lookup-events \\\\\\n  --lookup-attributes AttributeKey=Username,AttributeValue=root \\\\\\n  --start-time $(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n  --query 'Events[*].[EventTime,EventName,SourceIPAddress]' \\\\\\n  --output table\\n\\n# 4. All IAM changes in last 24 hours\\nfor event in CreateUser DeleteUser AttachRolePolicy DetachRolePolicy \\\\\\n             CreateAccessKey DeleteAccessKey AddUserToGroup; do\\n  echo \\\"=== $event ===\\\"\\n  aws cloudtrail lookup-events \\\\\\n    --lookup-attributes AttributeKey=EventName,AttributeValue=$event \\\\\\n    --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \\\\\\n    --query 'Events[*].[EventTime,Username,SourceIPAddress]' \\\\\\n    --output table\\ndone\\n\\n# 5. CloudWatch Insights \\u2014 high-level anomaly query\\naws logs start-query \\\\\\n  --log-group-name aws-cloudtrail-logs \\\\\\n  --start-time $(date -d '24 hours ago' +%s) \\\\\\n  --end-time $(date +%s) \\\\\\n  --query-string '\\n    fields eventTime, userIdentity.userName, eventName, sourceIPAddress, errorCode\\n    | filter errorCode like /AccessDenied/\\n    | stats count(*) as denied_count by userIdentity.userName, sourceIPAddress\\n    | sort denied_count desc\\n    | limit 20'\\n# High AccessDenied count = reconnaissance or attack in progress\\n```\\n\\n---\\n\\n## Critical CloudWatch Alarms\\n\\n```bash\\n# Alarm 1: Root account login\\naws logs put-metric-filter \\\\\\n  --log-group-name aws-cloudtrail-logs \\\\\\n  --filter-name RootLogin \\\\\\n  --filter-pattern '{ $.userIdentity.type = \\\"Root\\\" && $.eventName = \\\"ConsoleLogin\\\" }' \\\\\\n  --metric-transformations metricName=RootLoginCount,metricNamespace=CloudTrailAlarms,metricValue=1\\n\\naws cloudwatch put-metric-alarm \\\\\\n  --alarm-name RootAccountLogin \\\\\\n  --metric-name RootLoginCount \\\\\\n  --namespace CloudTrailAlarms \\\\\\n  --statistic Sum --period 300 --threshold 1 \\\\\\n  --comparison-operator GreaterThanOrEqualToThreshold \\\\\\n  --evaluation-periods 1 \\\\\\n  --alarm-actions arn:aws:sns:ap-south-1:123456789:SecurityAlerts\\n\\n# Alarm 2: CloudTrail stopped\\naws logs put-metric-filter \\\\\\n  --log-group-name aws-cloudtrail-logs \\\\\\n  --filter-name CloudTrailStopped \\\\\\n  --filter-pattern '{ $.eventName = \\\"StopLogging\\\" }' \\\\\\n  --metric-transformations metricName=CloudTrailStoppedCount,metricNamespace=CloudTrailAlarms,metricValue=1\\n\\n# Alarm 3: IAM policy change\\naws logs put-metric-filter \\\\\\n  --log-group-name aws-cloudtrail-logs \\\\\\n  --filter-name IAMPolicyChange \\\\\\n  --filter-pattern '{ $.eventSource = \\\"iam.amazonaws.com\\\" && ($.eventName = \\\"DeleteGroupPolicy\\\" || $.eventName = \\\"DeleteRolePolicy\\\" || $.eventName = \\\"AttachRolePolicy\\\" || $.eventName = \\\"DetachRolePolicy\\\") }' \\\\\\n  --metric-transformations metricName=IAMPolicyChangeCount,metricNamespace=CloudTrailAlarms,metricValue=1\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] Multi-region trail enabled covering all regions including global services\\n- [ ] Log file validation enabled \\u2014 detects tampering\\n- [ ] CloudTrail logs encrypted with customer-managed KMS key\\n- [ ] CloudTrail S3 bucket has delete-protection policy\\n- [ ] SCP blocks `cloudtrail:StopLogging` and `cloudtrail:DeleteTrail`\\n- [ ] S3 data events enabled on sensitive buckets\\n- [ ] CloudWatch metric filters + alarms on root login, IAM changes, trail stoppage\\n- [ ] Log retention set to 1 year minimum in S3\\n- [ ] CloudWatch log group for CloudTrail set to 90 day retention\\n\"}, {\"slug\": \"02-guardduty\", \"title\": \"GuardDuty \\u2014 Threat Detection, Findings, and Automated Response\", \"content\": \"# GuardDuty \\u2014 Threat Detection, Findings, and Automated Response\\n\\n## Attack Scenarios\\n\\n### Scenario 1 \\u2014 Finding Ignored, Breach Ongoing for Weeks\\n```bash\\n# GuardDuty raises: UnauthorizedAccess:IAMUser/TorIPCaller\\n# Finding sits in console \\u2014 no SNS, no PagerDuty, no Slack hook\\n# Nobody checks the GuardDuty console because \\\"it's always firing\\\"\\n\\n# Meanwhile attacker is:\\n# - Enumerating IAM roles (Recon:IAMUser/UserPermissions)\\n# - Creating backdoor users (Persistence:IAMUser/UserCreations)\\n# - Mining crypto (CryptoCurrency:EC2/BitcoinTool.B)\\n# All with corresponding GuardDuty findings \\u2014 all unread\\n```\\n\\n### Scenario 2 \\u2014 GuardDuty Disabled by Attacker\\n```bash\\n# After gaining admin access:\\nDETECTOR_ID=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)\\naws guardduty delete-detector --detector-id $DETECTOR_ID\\n# All future threat detection is now blind\\n# Without an SCP: single command, instant impact\\n```\\n\\n### Scenario 3 \\u2014 Credential Exfiltration Not Acted On\\n```bash\\n# GuardDuty raises: UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS\\n# This means: EC2 role credentials are being used from outside AWS (attacker's laptop)\\n# Alert fires at 2am, nobody responds until morning\\n# By then: all S3 data has been exfiltrated, backdoor user created, CloudTrail stopped\\n```\\n\\n---\\n\\n## Key GuardDuty Finding Types\\n\\n```\\nFinding                                              What It Means\\n\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\nUnauthorizedAccess:IAMUser/ConsoleLoginSuccess       Login from unusual location/IP\\nUnauthorizedAccess:IAMUser/TorIPCaller               API calls from Tor exit node\\nRecon:IAMUser/UserPermissions                        Attacker enumerating IAM\\nRecon:IAMUser/NetworkPermissions                     Attacker enumerating VPC/SGs\\nPersistence:IAMUser/UserCreations                    New IAM user created (backdoor)\\nPersistence:IAMUser/UserPermissions                  IAM policy changes for persistence\\nImpact:IAMUser/AnomalousBehavior                     Unusual volume of API calls\\nInstanceCredentialExfiltration.OutsideAWS            EC2 creds used outside AWS\\nCryptoCurrency:EC2/BitcoinTool.B                     Crypto miner running on EC2\\nBackdoor:EC2/C&CActivity.B                           EC2 calling known C2 server\\nUnauthorizedAccess:EC2/SSHBruteForce                 SSH brute force in progress\\nDiscovery:S3/BucketEnumeration.Unusual               Attacker listing your buckets\\nExfiltration:S3/ObjectRead.Unusual                   Unusual volume of S3 reads\\nPolicy:S3/BucketBlockPublicAccessDisabled            Block public access turned off\\n```\\n\\n---\\n\\n## Setup \\u2014 Enable GuardDuty Properly\\n\\n```bash\\n# 1. Enable GuardDuty in current region\\naws guardduty create-detector \\\\\\n  --enable \\\\\\n  --finding-publishing-frequency FIFTEEN_MINUTES \\\\\\n  --features '[\\n    {\\\"Name\\\": \\\"S3_DATA_EVENTS\\\", \\\"Status\\\": \\\"ENABLED\\\"},\\n    {\\\"Name\\\": \\\"EKS_AUDIT_LOGS\\\", \\\"Status\\\": \\\"ENABLED\\\"},\\n    {\\\"Name\\\": \\\"MALWARE_PROTECTION\\\", \\\"Status\\\": \\\"ENABLED\\\"},\\n    {\\\"Name\\\": \\\"RDS_LOGIN_EVENTS\\\", \\\"Status\\\": \\\"ENABLED\\\"},\\n    {\\\"Name\\\": \\\"LAMBDA_NETWORK_LOGS\\\", \\\"Status\\\": \\\"ENABLED\\\"}\\n  ]'\\n\\nDETECTOR_ID=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)\\necho \\\"Detector ID: $DETECTOR_ID\\\"\\n\\n# 2. Enable in ALL regions (use this loop)\\nfor region in $(aws ec2 describe-regions --query 'Regions[*].RegionName' --output text | tr '\\\\t' '\\\\n'); do\\n  echo \\\"Enabling GuardDuty in $region...\\\"\\n  aws guardduty create-detector \\\\\\n    --enable \\\\\\n    --finding-publishing-frequency FIFTEEN_MINUTES \\\\\\n    --region \\\"$region\\\" 2>/dev/null || echo \\\"Already enabled or error in $region\\\"\\ndone\\n\\n# 3. SCP \\u2014 prevent disabling GuardDuty\\naws organizations create-policy \\\\\\n  --name ProtectGuardDuty \\\\\\n  --type SERVICE_CONTROL_POLICY \\\\\\n  --content '{\\n    \\\"Version\\\": \\\"2012-10-17\\\",\\n    \\\"Statement\\\": [{\\n      \\\"Effect\\\": \\\"Deny\\\",\\n      \\\"Action\\\": [\\n        \\\"guardduty:DeleteDetector\\\",\\n        \\\"guardduty:DisassociateFromMasterAccount\\\",\\n        \\\"guardduty:StopMonitoringMembers\\\",\\n        \\\"guardduty:UpdateDetector\\\"\\n      ],\\n      \\\"Resource\\\": \\\"*\\\",\\n      \\\"Condition\\\": {\\n        \\\"StringNotEquals\\\": {\\n          \\\"aws:PrincipalArn\\\": \\\"arn:aws:iam::123456789:role/SecurityAdminRole\\\"\\n        }\\n      }\\n    }]\\n  }'\\n```\\n\\n---\\n\\n## Alerting \\u2014 Never Rely on the Console\\n\\n```bash\\n# Connect GuardDuty findings to SNS via EventBridge\\n# This fires on ANY GuardDuty finding\\n\\naws events put-rule \\\\\\n  --name GuardDutyFindings \\\\\\n  --event-pattern '{\\n    \\\"source\\\": [\\\"aws.guardduty\\\"],\\n    \\\"detail-type\\\": [\\\"GuardDuty Finding\\\"]\\n  }' \\\\\\n  --state ENABLED\\n\\n# Create SNS topic for alerts\\naws sns create-topic --name SecurityAlerts\\naws sns subscribe \\\\\\n  --topic-arn arn:aws:sns:ap-south-1:123456789:SecurityAlerts \\\\\\n  --protocol email \\\\\\n  --notification-endpoint sharan@company.com\\n\\n# Route HIGH and CRITICAL findings to SNS\\naws events put-rule \\\\\\n  --name GuardDutyHighSeverity \\\\\\n  --event-pattern '{\\n    \\\"source\\\": [\\\"aws.guardduty\\\"],\\n    \\\"detail-type\\\": [\\\"GuardDuty Finding\\\"],\\n    \\\"detail\\\": {\\n      \\\"severity\\\": [{\\\"numeric\\\": [\\\">=\\\", 7]}]\\n    }\\n  }' \\\\\\n  --state ENABLED\\n\\naws events put-targets \\\\\\n  --rule GuardDutyHighSeverity \\\\\\n  --targets 'Id=SNSTarget,Arn=arn:aws:sns:ap-south-1:123456789:SecurityAlerts'\\n```\\n\\n---\\n\\n## Automated Response \\u2014 EventBridge + Lambda\\n\\n```bash\\n# Auto-response: If GuardDuty detects credential exfiltration,\\n# automatically deactivate the access key\\n\\n# Create the response Lambda\\ncat > /tmp/response.py <<'EOF'\\nimport boto3\\nimport json\\n\\ndef handler(event, context):\\n    detail = event['detail']\\n    finding_type = detail['type']\\n    severity = detail['severity']\\n\\n    print(f\\\"GuardDuty finding: {finding_type} (severity: {severity})\\\")\\n\\n    # Handle credential exfiltration\\n    if 'InstanceCredentialExfiltration' in finding_type:\\n        # Get the affected role\\n        principal = detail.get('resource', {}).get('accessKeyDetails', {})\\n        access_key_id = principal.get('accessKeyId', '')\\n        user_name = principal.get('userName', '')\\n\\n        if access_key_id:\\n            print(f\\\"Deactivating compromised key: {access_key_id} for user {user_name}\\\")\\n            iam = boto3.client('iam')\\n            iam.update_access_key(\\n                UserName=user_name,\\n                AccessKeyId=access_key_id,\\n                Status='Inactive'\\n            )\\n            print(f\\\"Key {access_key_id} deactivated automatically\\\")\\n\\n    # Handle crypto mining\\n    if 'CryptoCurrency' in finding_type:\\n        ec2_details = detail.get('resource', {}).get('instanceDetails', {})\\n        instance_id = ec2_details.get('instanceId', '')\\n        if instance_id:\\n            print(f\\\"Isolating crypto-mining instance: {instance_id}\\\")\\n            ec2 = boto3.client('ec2')\\n            # Isolate by applying a deny-all security group\\n            ec2.modify_instance_attribute(\\n                InstanceId=instance_id,\\n                Groups=['sg-isolation-sg']  # Pre-created SG with no rules\\n            )\\n\\n    return {'statusCode': 200}\\nEOF\\n\\n# Route the finding to this Lambda\\naws events put-targets \\\\\\n  --rule GuardDutyHighSeverity \\\\\\n  --targets \\\"Id=AutoResponse,Arn=arn:aws:lambda:ap-south-1:123456789:function:GuardDutyAutoResponse\\\"\\n```\\n\\n---\\n\\n## Forensics \\u2014 Query Findings\\n\\n```bash\\n# List all active HIGH/CRITICAL findings\\nDETECTOR_ID=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)\\n\\naws guardduty list-findings \\\\\\n  --detector-id $DETECTOR_ID \\\\\\n  --finding-criteria '{\\n    \\\"Criterion\\\": {\\n      \\\"severity\\\": {\\\"Gte\\\": 7},\\n      \\\"service.archived\\\": {\\\"Eq\\\": [\\\"false\\\"]}\\n    }\\n  }' \\\\\\n  --query 'FindingIds' --output text | tr '\\\\t' '\\\\n' | head -20 | \\\\\\n  xargs -I{} aws guardduty get-findings \\\\\\n    --detector-id $DETECTOR_ID \\\\\\n    --finding-ids {} \\\\\\n    --query 'Findings[*].[Type,Severity,Title,UpdatedAt,Region]' \\\\\\n    --output table\\n\\n# Get details on a specific finding\\naws guardduty get-findings \\\\\\n  --detector-id $DETECTOR_ID \\\\\\n  --finding-ids <finding-id> \\\\\\n  --output json | python3 -m json.tool\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] GuardDuty enabled in ALL regions \\u2014 not just primary region\\n- [ ] All GuardDuty protection plans enabled (S3, EKS, Malware, RDS, Lambda)\\n- [ ] SCP blocks `guardduty:DeleteDetector` and `DisassociateFromMasterAccount`\\n- [ ] EventBridge rule routing HIGH/CRITICAL findings to SNS\\n- [ ] On-call team subscribed to SNS alerts \\u2014 not just email\\n- [ ] Automated response Lambda for credential exfiltration findings\\n- [ ] GuardDuty findings exported to Security Hub for aggregation\\n- [ ] Findings reviewed weekly \\u2014 archive resolved ones to reduce noise\\n- [ ] Trusted IP list configured to reduce false positives from your office IPs\\n\"}, {\"slug\": \"03-security-hub\", \"title\": \"Security Hub \\u2014 Aggregation, Standards, and SIEM Integration\", \"content\": \"# Security Hub \\u2014 Aggregation, Standards, and SIEM Integration\\n\\n## Attack Scenarios\\n\\n### Scenario 1 \\u2014 Siloed Findings Nobody Sees\\n```bash\\n# Without Security Hub:\\n# GuardDuty findings  \\u2192 GuardDuty console\\n# Config rules        \\u2192 AWS Config console\\n# Inspector findings  \\u2192 Inspector console\\n# Macie findings      \\u2192 Macie console\\n# IAM Access Analyzer \\u2192 IAM console\\n\\n# Security team checks 5 separate consoles\\n# Or more realistically: checks none of them\\n# A critical finding from Inspector about an unpatched CVE\\n# sits for 3 months because nobody looked\\n```\\n\\n### Scenario 2 \\u2014 No Compliance Baseline\\n```bash\\n# Without CIS Benchmark enabled in Security Hub:\\n# - No systematic check for root MFA\\n# - No check for CloudTrail in all regions\\n# - No check for security groups with 0.0.0.0/0\\n# Each of these would be a separate manual audit\\n\\n# With CIS enabled: Security Hub scores your account 0-100\\n# and lists every failing control with remediation guidance\\n```\\n\\n### Scenario 3 \\u2014 Findings Not Exported to SIEM\\n```bash\\n# SOC team uses Splunk or Elasticsearch for incident response\\n# AWS findings stay inside AWS \\u2014 SOC team has no visibility\\n# Attacker detected by GuardDuty at 2am\\n# SOC team doesn't see it until they log into AWS console next morning\\n```\\n\\n---\\n\\n## Setup \\u2014 Enable Security Hub\\n\\n```bash\\n# 1. Enable Security Hub\\naws securityhub enable-security-hub \\\\\\n  --enable-default-standards \\\\\\n  --control-finding-generator SECURITY_CONTROL\\n\\n# 2. Enable specific security standards\\n# CIS AWS Foundations Benchmark\\naws securityhub batch-enable-standards \\\\\\n  --standards-subscription-requests \\\\\\n    StandardsArn=arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.4.0\\n\\n# AWS Foundational Security Best Practices\\naws securityhub batch-enable-standards \\\\\\n  --standards-subscription-requests \\\\\\n    StandardsArn=arn:aws:securityhub:ap-south-1::standards/aws-foundational-security-best-practices/v/1.0.0\\n\\n# NIST SP 800-53 (if compliance required)\\naws securityhub batch-enable-standards \\\\\\n  --standards-subscription-requests \\\\\\n    StandardsArn=arn:aws:securityhub:ap-south-1::standards/nist-800-53/v/5.0.0\\n\\n# 3. Enable GuardDuty integration (sends findings to Security Hub)\\naws securityhub enable-import-findings-for-product \\\\\\n  --product-arn arn:aws:securityhub:ap-south-1::product/aws/guardduty\\n\\n# 4. Enable other integrations\\naws securityhub enable-import-findings-for-product \\\\\\n  --product-arn arn:aws:securityhub:ap-south-1::product/aws/inspector\\n\\naws securityhub enable-import-findings-for-product \\\\\\n  --product-arn arn:aws:securityhub:ap-south-1::product/aws/macie\\n\\naws securityhub enable-import-findings-for-product \\\\\\n  --product-arn arn:aws:securityhub:ap-south-1::product/aws/access-analyzer\\n```\\n\\n---\\n\\n## Querying Findings\\n\\n```bash\\n# 1. Get overall security score per standard\\naws securityhub describe-standards-controls \\\\\\n  --standards-subscription-arn arn:aws:securityhub:ap-south-1:123456789:subscription/cis-aws-foundations-benchmark/v/1.4.0 \\\\\\n  --query 'Controls[?ControlStatus==`FAILED`].[ControlId,Title,SeverityRating]' \\\\\\n  --output table\\n\\n# 2. List all CRITICAL findings\\naws securityhub get-findings \\\\\\n  --filters '{\\n    \\\"SeverityLabel\\\": [{\\\"Value\\\": \\\"CRITICAL\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}],\\n    \\\"RecordState\\\": [{\\\"Value\\\": \\\"ACTIVE\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}],\\n    \\\"WorkflowStatus\\\": [{\\\"Value\\\": \\\"NEW\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}]\\n  }' \\\\\\n  --query 'Findings[*].[Title,ProductName,UpdatedAt,Description]' \\\\\\n  --output table\\n\\n# 3. Find findings about specific resources\\naws securityhub get-findings \\\\\\n  --filters '{\\n    \\\"ResourceId\\\": [{\\\"Value\\\": \\\"arn:aws:s3:::my-bucket\\\", \\\"Comparison\\\": \\\"CONTAINS\\\"}],\\n    \\\"RecordState\\\": [{\\\"Value\\\": \\\"ACTIVE\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}]\\n  }' \\\\\\n  --query 'Findings[*].[Title,Severity.Label,ProductName]' \\\\\\n  --output table\\n\\n# 4. Count findings by severity\\naws securityhub get-findings \\\\\\n  --filters '{\\\"RecordState\\\": [{\\\"Value\\\": \\\"ACTIVE\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}]}' \\\\\\n  --query 'Findings[*].Severity.Label' \\\\\\n  --output text | tr '\\\\t' '\\\\n' | sort | uniq -c | sort -rn\\n\\n# 5. Get specific CIS controls that are failing\\naws securityhub get-findings \\\\\\n  --filters '{\\n    \\\"ProductName\\\": [{\\\"Value\\\": \\\"Security Hub\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}],\\n    \\\"ComplianceStatus\\\": [{\\\"Value\\\": \\\"FAILED\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}],\\n    \\\"SeverityLabel\\\": [{\\\"Value\\\": \\\"HIGH\\\", \\\"Comparison\\\": \\\"EQUALS\\\"}]\\n  }' \\\\\\n  --query 'Findings[*].[Title,Remediation.Recommendation.Text]' \\\\\\n  --output table\\n```\\n\\n---\\n\\n## Automated Alerting and Suppression\\n\\n```bash\\n# Route CRITICAL findings to PagerDuty/SNS via EventBridge\\naws events put-rule \\\\\\n  --name SecurityHubCritical \\\\\\n  --event-pattern '{\\n    \\\"source\\\": [\\\"aws.securityhub\\\"],\\n    \\\"detail-type\\\": [\\\"Security Hub Findings - Imported\\\"],\\n    \\\"detail\\\": {\\n      \\\"findings\\\": {\\n        \\\"Severity\\\": {\\n          \\\"Label\\\": [\\\"CRITICAL\\\", \\\"HIGH\\\"]\\n        },\\n        \\\"Workflow\\\": {\\n          \\\"Status\\\": [\\\"NEW\\\"]\\n        },\\n        \\\"RecordState\\\": [\\\"ACTIVE\\\"]\\n      }\\n    }\\n  }' \\\\\\n  --state ENABLED\\n\\naws events put-targets \\\\\\n  --rule SecurityHubCritical \\\\\\n  --targets 'Id=SecurityAlertsSNS,Arn=arn:aws:sns:ap-south-1:123456789:SecurityAlerts'\\n\\n# Suppress known false positives (e.g., specific test accounts)\\naws securityhub batch-update-findings \\\\\\n  --finding-identifiers '[{\\\"Id\\\": \\\"finding-id\\\", \\\"ProductArn\\\": \\\"product-arn\\\"}]' \\\\\\n  --workflow '{\\\"Status\\\": \\\"SUPPRESSED\\\"}' \\\\\\n  --note '{\\\"Text\\\": \\\"Test account \\u2014 expected behavior\\\", \\\"UpdatedBy\\\": \\\"sharan\\\"}'\\n```\\n\\n---\\n\\n## Export to SIEM (Splunk / Elasticsearch)\\n\\n```bash\\n# Option 1: Kinesis Firehose to S3, then SIEM picks up from S3\\naws firehose create-delivery-stream \\\\\\n  --delivery-stream-name SecurityHubToS3 \\\\\\n  --s3-destination-configuration '{\\n    \\\"RoleARN\\\": \\\"arn:aws:iam::123456789:role/FirehoseRole\\\",\\n    \\\"BucketARN\\\": \\\"arn:aws:s3:::siem-ingestion-bucket\\\",\\n    \\\"Prefix\\\": \\\"securityhub/\\\",\\n    \\\"BufferingHints\\\": {\\\"SizeInMBs\\\": 5, \\\"IntervalInSeconds\\\": 300},\\n    \\\"CompressionFormat\\\": \\\"GZIP\\\"\\n  }'\\n\\n# Route Security Hub findings to Firehose via EventBridge\\naws events put-targets \\\\\\n  --rule SecurityHubCritical \\\\\\n  --targets 'Id=FirehoseTarget,Arn=arn:aws:firehose:ap-south-1:123456789:deliverystream/SecurityHubToS3'\\n\\n# Option 2: Use AWS Security Lake (centralizes all security data)\\n# Normalizes to OCSF format \\u2014 works with any SIEM\\naws securitylake create-data-lake \\\\\\n  --configurations '[\\n    {\\n      \\\"region\\\": \\\"ap-south-1\\\",\\n      \\\"encryptionConfiguration\\\": {\\n        \\\"kmsKeyId\\\": \\\"arn:aws:kms:ap-south-1:123456789:key/key-id\\\"\\n      }\\n    }\\n  ]'\\n```\\n\\n---\\n\\n## Checklist\\n\\n- [ ] Security Hub enabled in all regions\\n- [ ] CIS AWS Foundations Benchmark standard enabled\\n- [ ] AWS Foundational Security Best Practices standard enabled\\n- [ ] GuardDuty, Inspector, Macie, and Access Analyzer integrations enabled\\n- [ ] Cross-region aggregation configured \\u2014 one region as primary\\n- [ ] EventBridge routing CRITICAL/HIGH findings to SNS and on-call\\n- [ ] Security score reviewed weekly \\u2014 target 90%+\\n- [ ] SIEM integration via Kinesis Firehose or Security Lake\\n- [ ] Suppression rules for known false positives (documented)\\n- [ ] Finding SLAs defined \\u2014 CRITICAL resolved within 24h, HIGH within 7 days\\n\"}], \"tags\": [\"cloudtrail\", \"guardduty\", \"security-hub\"], \"desc\": \"CloudTrail hardening, GuardDuty auto-response, Security Hub aggregation and SIEM export\"}]");

// ── Markdown renderer ─────────────────────────────────────────────
function renderMd(raw) {
  // Escape HTML
  let s = raw
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Fenced code blocks — process first, restore HTML entities inside
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, function(_, code) {
    var c = code
      .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
    // Syntax highlights
    c = c.replace(/(#[^\n]*)/g, '<span class="cm">$1</span>');
    c = c.replace(/--[\w-]+/g, '<span class="ck">$&</span>');
    c = c.replace(/\b(aws|git|curl|chmod|export|echo|cat|cd|mkdir|rm|find|grep|tr|python3|pip|npm|docker|bash|source|while|read|do|done|for|if|then|fi)\b/g, '<span class="ck">$1</span>');
    c = c.replace(/\[PASS\][^\n]*/g, '<span class="cg">$&</span>');
    c = c.replace(/\[CRITICAL\][^\n]*/g, '<span class="cr">$&</span>');
    c = c.replace(/\[WARNING\][^\n]*/g, '<span class="cw">$&</span>');
    return '<pre><code>' + c + '</code></pre>';
  });

  // Inline code — backticks already safe since they were in the raw markdown
  // but after HTML escaping they appear as-is. We need to handle them.
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // HR
  s = s.replace(/^---$/gm, '<hr/>');

  // Bold / italic
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');

  // Links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Tables
  s = s.replace(/((?:\|.+\|\n)+)/g, function(block) {
    var lines = block.trim().split('\n').filter(function(l){ return l.trim(); });
    if (lines.length < 2) return block;
    // Check if second line is separator
    if (!/^[\|\s:\-]+$/.test(lines[1])) return block;
    var header = lines[0].split('|').map(function(c){return c.trim();}).filter(Boolean);
    var ths = header.map(function(h){ return '<th>' + h + '</th>'; }).join('');
    var rows = lines.slice(2).map(function(row){
      var cells = row.split('|').map(function(c){return c.trim();}).filter(Boolean);
      return '<tr>' + cells.map(function(c){ return '<td>' + c + '</td>'; }).join('') + '</tr>';
    }).join('');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });

  // Blockquote
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // Checkboxes
  s = s.replace(/^- \[x\] (.+)$/gm, '<li><input type="checkbox" checked disabled> $1</li>');
  s = s.replace(/^- \[ \] (.+)$/gm,  '<li><input type="checkbox" disabled> $1</li>');

  // Lists
  s = s.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/^\d+\. (.+)$/gm,  '<li>$1</li>');

  // Wrap consecutive <li> in <ul>
  s = s.replace(/(<li>[\s\S]*?<\/li>)(?:\n(?=<li>)|(?!\n<li>))/g, function(m) {
    return m;
  });
  s = s.replace(/((?:<li>[^]*?<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs — lines not already wrapped
  s = s.replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>');

  return '<div class="md">' + s + '</div>';
}

var state = { view: 'home', secId: null, docSlug: null };

function setTitlebar() {
  var el = document.getElementById('tp');
  var h = '<span class="seg">sharan@sre</span><span class="sep">:</span><span class="seg">~/aws-security-best-practices</span>';
  if (state.secId) {
    var sec = SECTIONS.find(function(s){ return s.id === state.secId; });
    h += '<span class="sep">/</span><span class="seg">' + sec.id + '</span>';
  }
  if (state.docSlug) {
    h += '<span class="sep">/</span><span class="seg">' + state.docSlug + '.md</span>';
  }
  el.innerHTML = h;
}

function nav(newState) {
  state = newState;
  render();
}

function render() {
  setTitlebar();
  var app = document.getElementById('app');
  app.innerHTML = '';
  if (state.view === 'home')    renderHome(app);
  if (state.view === 'section') renderSection(app);
  if (state.view === 'doc')     renderDoc(app);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

  ].join('');
  app.appendChild(wrap);

  document.getElementById('bbsec').onclick = function() {
    nav({ view:'section', secId:sec.id, docSlug:null });
  };
  if (prev) document.getElementById('btnprev').onclick = function() {
    nav({ view:'doc', secId:sec.id, docSlug:prev.slug });
  };
  if (next) document.getElementById('btnnext').onclick = function() {
    nav({ view:'doc', secId:sec.id, docSlug:next.slug });
  };
}

render();
</script>
</body>
</html>
